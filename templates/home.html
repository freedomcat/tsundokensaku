{% extends "base.html" %}
{% block title %}つんどけんさく | ホーム{% endblock %}
{% block content %}
{% if index_progress.running %}
<section class="card">
  <p style="margin: 0;">
    <span class="pill">インデックス処理中</span>
    <span class="muted" style="margin-left: 8px;">
      {{ index_progress.message or '処理中' }}
      {% if index_progress.title %} / 対象: {{ index_progress.title }}{% endif %}
    </span>
  </p>
</section>
{% endif %}
<section class="card">
  <form class="search" action="/search" method="get">
    <input type="search" name="q" value="{{ query }}" placeholder="キーワードを入力して検索">
    <select name="scope" aria-label="検索範囲">
      {% for option in scope_options %}
        <option value="{{ option.value }}" {% if option.value == scope %}selected{% endif %}>{{ option.label }}</option>
      {% endfor %}
    </select>
    <input type="hidden" name="match" value="any">
    <label class="pill" style="display:inline-flex; align-items:center; gap:8px;">
      <input type="checkbox" name="match" value="all" {% if match == 'all' %}checked{% endif %}>
      すべての語を含む
    </label>
    <button class="primary" type="submit">検索</button>
  </form>
</section>
{% endblock %}
