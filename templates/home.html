{% extends "base.html" %}
{% block title %}つんどけんさく | ホーム{% endblock %}
{% block content %}
<section class="card">
  <form class="search" action="/search" method="get">
    <input type="search" name="q" value="{{ query }}" placeholder="キーワードを入力して検索">
    <select name="scope" aria-label="検索範囲">
      {% for option in scope_options %}
        <option value="{{ option.value }}" {% if option.value == scope %}selected{% endif %}>{{ option.label }}</option>
      {% endfor %}
    </select>
    <button class="primary" type="submit">検索</button>
  </form>
</section>
{% endblock %}
