{% extends "base.html" %}
{% block title %}つんどけんさく | ホーム{% endblock %}
{% block content %}
{% if index_progress.running %}
<section class="card">
  <p style="margin: 0;">
    <span class="pill">インデックス処理中</span>
    <span class="muted" style="margin-left: 8px;">
      {{ index_progress.message or '処理中' }}
      {% if index_progress.title %} / 対象: {{ index_progress.title }}{% endif %}
    </span>
  </p>
</section>
{% endif %}
<section class="card">
  <form class="search" action="/search" method="get">
    <input type="search" name="q" value="{{ query }}" placeholder="キーワード（&quot;フレーズ&quot; や -除外語 も可）">
    <select name="scope" aria-label="検索範囲">
      {% for option in scope_options %}
        <option value="{{ option.value }}" {% if option.value == scope %}selected{% endif %}>{{ option.label }}</option>
      {% endfor %}
    </select>
    <input type="hidden" name="match" value="any">
    <label class="pill" style="display:inline-flex; align-items:center; gap:8px;">
      <input type="checkbox" name="match" value="all" {% if match == 'all' %}checked{% endif %}>
      すべての語を含む
    </label>
    <button class="primary" type="submit">検索</button>
  </form>
</section>
<section class="card" id="home-pack-card" hidden>
  <h2 style="margin: 0 0 6px;" id="home-pack-name"></h2>
  <p class="muted" style="margin: 0 0 14px;" id="home-pack-summary"></p>
  <div class="ws-toolbar">
    <a class="button" href="/workspace">資料机で整理する</a>
  </div>
</section>
<script>
  (() => {
    const card = document.getElementById('home-pack-card');
    const nameEl = document.getElementById('home-pack-name');
    const summaryEl = document.getElementById('home-pack-summary');

    function render() {
      const pack = TsundokuCart.getActivePack();
      card.hidden = !pack;
      if (pack) {
        nameEl.textContent = pack.name;
        summaryEl.textContent = TsundokuCart.summaryLabel(TsundokuCart.load());
      }
    }

    document.addEventListener('tsundoku-cart-updated', render);
    render();
  })();
</script>
{% endblock %}
