{% extends "base.html" %}
{% block title %}つんどけんさく | ホーム{% endblock %}
{% block content %}
<section class="card">
  <div class="grid">
    <div class="stat">
      <div class="label">登録済みPDF数</div>
      <div class="value">{{ book_count }}</div>
    </div>
    <div class="stat">
      <div class="label">インデックス済みページ数</div>
      <div class="value">{{ page_count }}</div>
    </div>
    <div class="stat">
      <div class="label">PDFファイル数</div>
      <div class="value">{{ pdf_count }}</div>
    </div>
  </div>
</section>

<section class="card">
  <form class="search" action="/search" method="get">
    <input type="search" name="q" value="{{ query }}" placeholder="キーワードを入力して検索">
    <select name="scope" aria-label="検索範囲">
      {% for option in scope_options %}
        <option value="{{ option.value }}" {% if option.value == scope %}selected{% endif %}>{{ option.label }}</option>
      {% endfor %}
    </select>
    <button class="primary" type="submit">検索</button>
  </form>
  <p class="muted" style="margin-top: 12px;">
    PDFフォルダを走査して、SQLite FTS5 に保存した内容を検索します。
  </p>
</section>
{% endblock %}
