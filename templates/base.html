<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}つんどけんさく{% endblock %}</title>
    <link rel="icon" href="/static/tsundokensaku-logo.png" type="image/png">
    <link rel="apple-touch-icon" href="/static/tsundokensaku-logo.png">
    <script src="/static/pages-spec.js"></script>
    <script src="/static/pack-store.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --panel: #fffaf0;
        --text: #1f2328;
        --muted: #5f6b7a;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --border: #d7d2c8;
        --shadow: 0 12px 32px rgba(20, 30, 40, 0.08);
      }

      * { box-sizing: border-box; }

      [hidden] {
        display: none !important;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 30%),
          radial-gradient(circle at top right, rgba(180, 83, 9, 0.10), transparent 24%),
          var(--bg);
      }

      a { color: var(--accent-strong); text-decoration: none; }
      a:hover { text-decoration: underline; }

      .shell {
        max-width: 1080px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
        position: relative;
        z-index: 20;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        justify-self: center;
      }

      .brand-link {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--text);
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(255, 250, 240, 0.95), rgba(245, 241, 232, 0.9));
        border: 1px solid rgba(140, 158, 168, 0.38);
        box-shadow: var(--shadow);
      }

      .brand-link:hover {
        text-decoration: none;
      }

      .brand-mark {
        width: 56px;
        height: 56px;
        border-radius: 12px;
        object-fit: cover;
        box-shadow: var(--shadow);
      }

      .brand-text {
        display: grid;
        gap: 4px;
      }

      .brand h1 {
        margin: 0;
        font-size: clamp(1.4rem, 2vw, 2.2rem);
        letter-spacing: -0.02em;
        font-weight: 700;
        color: #24415b;
      }

      .meta,
      .muted {
        margin: 0;
        color: var(--muted);
      }

      .nav {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-self: end;
        position: relative;
        z-index: 21;
      }

      .topbar > [aria-hidden="true"] {
        width: 1px;
        height: 1px;
      }

      .nav a,
      button,
      .button {
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        padding: 10px 14px;
        border-radius: 999px;
        box-shadow: var(--shadow);
        font: inherit;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
        line-height: 1.2;
      }

      .nav a {
        min-width: 88px;
      }

      .nav a.active,
      button.primary,
      .button.primary {
        background: var(--accent);
        color: white;
        border-color: transparent;
      }

      .card {
        background: rgba(255, 250, 240, 0.88);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(215, 210, 200, 0.9);
        border-radius: 24px;
        box-shadow: var(--shadow);
        padding: 20px;
        margin-bottom: 20px;
      }

      .collapsible-card {
        padding: 0;
        overflow: hidden;
      }

      .collapsible-card > summary {
        list-style: none;
        cursor: pointer;
        padding: 20px;
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--text);
      }

      .collapsible-card > summary::-webkit-details-marker {
        display: none;
      }

      .collapsible-card > summary::after {
        content: "▾";
        float: right;
        color: var(--muted);
        transition: transform 0.2s ease;
      }

      .collapsible-card[open] > summary::after {
        transform: rotate(180deg);
      }

      .collapsible-card > .card-body {
        padding: 0 20px 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      .stat {
        padding: 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.75);
        border: 1px solid var(--border);
      }

      .stat .label { color: var(--muted); font-size: 0.92rem; }
      .stat .value { font-size: 2rem; font-weight: 700; margin-top: 6px; }

      .progress-shell {
        display: grid;
        gap: 10px;
      }

      .progress {
        width: 100%;
        height: 14px;
        border-radius: 999px;
        background: rgba(95, 107, 122, 0.16);
        overflow: hidden;
        border: 1px solid var(--border);
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), #2ea99a);
        transition: width 0.25s ease;
      }

      form.search {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      input[type="search"] {
        flex: 1 1 280px;
        border: 1px solid var(--border);
        background: white;
        border-radius: 16px;
        padding: 14px 16px;
        font: inherit;
      }

      select {
        border: 1px solid var(--border);
        background: white;
        border-radius: 16px;
        padding: 14px 16px;
        font: inherit;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th, td {
        text-align: left;
        border-bottom: 1px solid var(--border);
        padding: 12px 8px;
        vertical-align: top;
      }

      th { color: var(--muted); font-weight: 600; }

      .action-cell {
        white-space: nowrap;
        width: 1%;
      }

      .timestamp-cell {
        white-space: nowrap;
      }

      .kindle-table th:nth-child(2),
      .kindle-table td:nth-child(2) {
        white-space: nowrap;
      }

      .kindle-table th:nth-child(3),
      .kindle-table td:nth-child(3) {
        white-space: nowrap;
        width: 1%;
      }

      .kindle-table th:nth-child(4),
      .kindle-table td:nth-child(4),
      .kindle-table th:nth-child(5),
      .kindle-table td:nth-child(5) {
        width: 1%;
      }

      .pill {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(15, 118, 110, 0.1);
        color: var(--accent-strong);
        font-size: 0.88rem;
      }

      .results {
        display: grid;
        gap: 14px;
      }

      .result {
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(255,255,255,0.74);
      }

      .result-layout {
        display: grid;
        grid-template-columns: 96px 1fr;
        gap: 16px;
        align-items: start;
      }

      .result-layout.no-cover {
        grid-template-columns: 1fr;
      }

      .result-cover {
        width: 96px;
      }

      .cover-thumb {
        width: 96px;
        height: 136px;
        border-radius: 12px;
        display: block;
        object-fit: cover;
        background: linear-gradient(135deg, rgba(15, 118, 110, 0.12), rgba(180, 83, 9, 0.12));
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
      }

      .result-body {
        min-width: 0;
      }

      .result-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin: 8px 0 6px;
      }

      .page-links {
        margin-top: 10px;
      }

      .result h3 {
        margin: 0 0 6px;
        font-size: 1.04rem;
      }

      .snippet {
        white-space: pre-wrap;
        line-height: 1.55;
        margin-top: 10px;
      }

      mark {
        background: rgba(245, 158, 11, 0.28);
        color: inherit;
        padding: 0 0.08em;
        border-radius: 0.18em;
      }

      .footer {
        margin-top: 28px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .cart-toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--panel);
        box-shadow: var(--shadow);
        cursor: pointer;
        line-height: 1.2;
      }

      .cart-bar {
        position: sticky;
        bottom: 12px;
        z-index: 30;
        border-color: var(--accent);
      }

      .cart-summary {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .cart-status {
        font-size: 0.88rem;
        overflow-wrap: anywhere;
      }

      .nav a .pill {
        margin-left: 6px;
        padding: 2px 8px;
      }

      .ws-toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .ws-status {
        flex-basis: 100%;
        color: var(--muted);
        font-size: 0.88rem;
        overflow-wrap: anywhere;
      }

      .ws-status.is-error,
      .ws-error {
        color: #b91c1c;
        background: rgba(220, 38, 38, 0.08);
        border: 1px solid rgba(220, 38, 38, 0.28);
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 0.88rem;
      }

      .ws-status.is-error::before,
      .ws-error::before {
        content: "⚠ ";
      }

      .ws-book {
        border: 1px solid var(--border);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.75);
        margin-bottom: 12px;
        overflow: hidden;
      }

      .ws-book > summary {
        list-style: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
      }

      .ws-book > summary::-webkit-details-marker {
        display: none;
      }

      .ws-book > summary::before {
        content: "▸";
        color: var(--muted);
      }

      .ws-book[open] > summary::before {
        content: "▾";
      }

      .ws-book-title {
        flex: 1;
        min-width: 0;
        font-weight: 600;
        overflow-wrap: anywhere;
      }

      .ws-book-body {
        padding: 0 16px 16px;
        display: grid;
        gap: 10px;
      }

      .ws-pages-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .ws-pages-row input {
        flex: 1 1 200px;
        max-width: 320px;
        padding: 7px 9px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: white;
        font: inherit;
      }

      .ws-chapters {
        display: grid;
        gap: 2px;
        max-height: 280px;
        overflow-y: auto;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 8px;
        background: white;
      }

      .ws-chapters-caption {
        color: var(--muted);
        font-size: 0.88rem;
      }

      .ws-remove {
        padding: 6px 12px;
        font-size: 0.88rem;
      }

      .modal-panel.ws-add-panel {
        width: min(720px, 100%);
        height: auto;
        max-height: min(85vh, 900px);
        grid-template-rows: auto auto minmax(0, 1fr) auto;
      }

      .ws-add-form {
        display: flex;
        gap: 8px;
        padding: 12px;
        border-bottom: 1px solid var(--border);
      }

      .ws-add-form input[type="search"] {
        flex: 1;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
      }

      .ws-add-form select {
        max-width: 220px;
        padding: 10px 12px;
        border-radius: 10px;
      }

      .ws-add-results {
        overflow-y: auto;
        padding: 12px;
        display: grid;
        gap: 10px;
        align-content: start;
        min-height: 160px;
      }

      .ws-add-book-title {
        font-weight: 600;
        margin-bottom: 4px;
      }

      .ws-add-row-added {
        color: var(--muted);
        cursor: default;
      }

      .ws-add-footer {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        padding: 12px;
        border-top: 1px solid var(--border);
      }

      .viewer-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }

      .viewer-header h2 {
        margin: 4px 0 0;
        font-size: 1rem;
        overflow-wrap: anywhere;
      }

      .viewer-frame {
        height: calc(100vh - 190px);
        min-height: 520px;
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        background: white;
        box-shadow: var(--shadow);
      }

      .viewer-frame iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }

      .settings-layout {
        display: grid;
        grid-template-columns: 200px minmax(0, 1fr);
        gap: 20px;
        align-items: start;
      }

      .settings-sidebar {
        display: grid;
        gap: 10px;
        align-self: start;
      }

      .settings-nav {
        display: grid;
        gap: 8px;
      }

      .settings-nav a {
        display: block;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.64);
        text-decoration: none;
        color: inherit;
      }

      .settings-nav a.active {
        border-color: var(--accent);
        background: rgba(61, 98, 176, 0.08);
      }

      .settings-sidebar .stat {
        margin: 0;
        padding: 12px;
        border-radius: 14px;
      }

      .settings-sidebar .stat .label {
        font-size: 0.78rem;
      }

      .settings-sidebar .stat .value {
        font-size: 1.1rem;
        margin-top: 4px;
      }

      .settings-sidebar .grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        background: rgba(17, 24, 39, 0.58);
        z-index: 1000;
      }

      .modal.open {
        display: flex;
      }

      .modal-panel {
        width: min(1200px, 100%);
        height: min(92vh, 980px);
        background: white;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.35);
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .modal-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }

      .modal-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .modal-export-status {
        flex-basis: 100%;
        color: var(--muted);
        font-size: 0.86rem;
        overflow-wrap: anywhere;
        text-align: right;
      }

      .modal-export-status.is-error {
        color: #b91c1c;
        background: rgba(220, 38, 38, 0.08);
        border: 1px solid rgba(220, 38, 38, 0.28);
        border-radius: 8px;
        padding: 6px 10px;
      }

      .modal-export-status.is-error::before {
        content: "⚠ ";
      }

      .modal-share {
        position: relative;
      }

      .modal-share > summary {
        list-style: none;
        cursor: pointer;
      }

      .modal-share > summary::-webkit-details-marker {
        display: none;
      }

      .modal-share-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 38px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: white;
        color: var(--text);
        box-shadow: var(--shadow);
      }

      .modal-share-menu {
        position: absolute;
        right: 0;
        top: calc(100% + 8px);
        min-width: 220px;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: white;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.18);
        z-index: 10;
      }

      .modal-share-menu.is-empty {
        min-width: 160px;
      }

      .modal-share-link {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        border: 0;
        background: transparent;
        box-shadow: none;
        padding: 10px 12px;
        border-radius: 10px;
        text-decoration: none;
        color: inherit;
        cursor: pointer;
        font: inherit;
        text-align: left;
      }

      .modal-share-link:hover {
        background: var(--panel);
      }

      .modal-share-link svg {
        width: 20px;
        height: 20px;
        flex: none;
      }

      .modal-share-empty {
        padding: 10px 12px;
        color: var(--muted);
      }

      .modal-title {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .modal-panel:fullscreen {
        width: 100vw;
        height: 100vh;
        max-width: none;
        border-radius: 0;
      }

      .modal-panel:fullscreen .modal-viewport {
        background: white;
      }

      .modal-pages {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 0 2px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .modal-pages input {
        width: 120px;
        padding: 7px 9px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: white;
        font: inherit;
      }

      .modal-chapters {
        position: relative;
      }

      .modal-chapters > summary {
        list-style: none;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--border);
        background: white;
        color: var(--text);
        padding: 7px 12px;
        border-radius: 8px;
        font-size: 0.92rem;
        white-space: nowrap;
      }

      .modal-chapters > summary::-webkit-details-marker {
        display: none;
      }

      .modal-chapters-menu {
        position: absolute;
        left: 0;
        top: calc(100% + 8px);
        min-width: 300px;
        max-width: 420px;
        max-height: 50vh;
        overflow-y: auto;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: white;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.18);
        z-index: 10;
      }

      .modal-chapter-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.92rem;
      }

      .modal-chapter-item:hover {
        background: var(--panel);
      }

      .modal-chapters-clear {
        display: block;
        width: 100%;
        border: 0;
        background: transparent;
        box-shadow: none;
        padding: 7px 10px;
        border-radius: 8px;
        color: var(--accent-strong);
        cursor: pointer;
        font-size: 0.92rem;
        text-align: left;
      }

      .modal-chapters-clear:hover {
        background: var(--panel);
      }

      .modal-chapter-item input {
        flex: none;
      }

      .modal-chapter-item span {
        overflow-wrap: anywhere;
      }

      .modal-viewport {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: white;
      }

      @media (max-width: 640px) {
        .shell { padding: 16px 12px 32px; }
        .brand-mark { width: 48px; height: 48px; }
        .topbar { grid-template-columns: 1fr; justify-items: center; }
        .topbar > [aria-hidden="true"] { display: none; }
        .brand { justify-self: center; }
        .nav { justify-self: center; }
        .settings-layout { grid-template-columns: 1fr; }
        .settings-sidebar { position: static; }
        .card { padding: 16px; border-radius: 18px; }
        th, td { padding: 10px 6px; }
        .viewer-header { align-items: flex-start; flex-direction: column; }
        .viewer-frame { height: calc(100vh - 230px); min-height: 420px; }
        .result-layout { grid-template-columns: 72px 1fr; gap: 12px; }
        .result-cover,
        .cover-thumb { width: 72px; height: 102px; }
        .progress { height: 12px; }
        .modal { padding: 8px; }
        .modal-panel { height: 96vh; border-radius: 10px; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <div aria-hidden="true"></div>
        <div class="brand">
          <a class="brand-link" href="/" aria-label="ホームへ戻る">
            <img class="brand-mark" src="/static/tsundokensaku-logo.png" alt="">
            <div class="brand-text">
              <h1>つんどけんさく</h1>
            </div>
          </a>
        </div>
        <nav class="nav">
          <a href="/workspace" class="{% if request.url.path == '/workspace' %}active{% endif %}" style="min-width: 88px;">資料棚<span class="pill" id="nav-workspace-count" hidden></span></a>
          <a href="/settings" class="{% if request.url.path.startswith('/settings') %}active{% endif %}" style="min-width: 88px;">設定</a>
        </nav>
      </div>
      {% block content %}{% endblock %}
    </div>
      <div class="modal" id="pdf-modal" aria-hidden="true">
        <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="pdf-modal-title">
          <div class="modal-bar">
            <div class="modal-title" id="pdf-modal-title"></div>
            <div class="modal-actions">
              <details class="modal-chapters" id="pdf-modal-chapters-wrap" hidden>
                <summary id="pdf-modal-chapters-summary">章を選択</summary>
                <div class="modal-chapters-menu" id="pdf-modal-chapters"></div>
              </details>
              <label class="modal-pages">
                <span>ページ</span>
                <input id="pdf-modal-pages" type="text" inputmode="numeric" placeholder="例: 11-15,18">
              </label>
              <button type="button" id="pdf-modal-add-workspace" hidden>資料に追加</button>
              <a class="button" id="pdf-modal-export" href="#" target="_blank" rel="noreferrer">指定ページ切出</a>
              <a class="button" id="pdf-modal-export-md" href="#" target="_blank" rel="noreferrer">MD切出</a>
              <details class="modal-share">
                <summary class="modal-share-button" aria-label="シェア">
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path fill="currentColor" d="M18 16a3 3 0 0 0-2.24 1.01l-6.16-3.08a3.1 3.1 0 0 0 0-2.86l6.16-3.08A3 3 0 1 0 15 6c0 .27.04.53.11.78L9.08 9.86a3 3 0 1 0 0 4.28l6.03 3.08A3 3 0 1 0 18 16Zm0-10a1 1 0 1 1 0 2 1 1 0 0 1 0-2Zm-12 8a1 1 0 1 1 0-2 1 1 0 0 1 0 2Zm12 4a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"/>
                  </svg>
                </summary>
                <div class="modal-share-menu" id="pdf-modal-share-menu"></div>
              </details>
              <button type="button" id="pdf-modal-fullscreen">全画面</button>
              <a class="button" id="pdf-modal-open" href="#" target="_blank" rel="noreferrer">PDFを開く</a>
              <a class="button" id="pdf-modal-scrapbox" href="#" target="_blank" rel="noreferrer" hidden>Scrapboxで開く</a>
              <button type="button" id="pdf-modal-close">閉じる</button>
              <div class="modal-export-status" id="pdf-modal-export-status"></div>
            </div>
          </div>
          <iframe class="modal-viewport" id="pdf-modal-frame" title="PDF viewer"></iframe>
        </div>
      </div>
    <script>
      (() => {
        const modal = document.getElementById('pdf-modal');
        const modalPanel = modal?.querySelector('.modal-panel');
        const frame = document.getElementById('pdf-modal-frame');
        const title = document.getElementById('pdf-modal-title');
        const pagesInput = document.getElementById('pdf-modal-pages');
        const chaptersWrap = document.getElementById('pdf-modal-chapters-wrap');
        const chaptersMenu = document.getElementById('pdf-modal-chapters');
        const chaptersSummary = document.getElementById('pdf-modal-chapters-summary');
        const exportLink = document.getElementById('pdf-modal-export');
        const exportMdLink = document.getElementById('pdf-modal-export-md');
        const addWorkspaceButton = document.getElementById('pdf-modal-add-workspace');
        const exportStatus = document.getElementById('pdf-modal-export-status');
        const fullscreenButton = document.getElementById('pdf-modal-fullscreen');
        const openLink = document.getElementById('pdf-modal-open');
        const shareMenu = document.getElementById('pdf-modal-share-menu');
        const shareDetails = modal?.querySelector('.modal-share');
        const scrapboxLink = document.getElementById('pdf-modal-scrapbox');
        const closeButton = document.getElementById('pdf-modal-close');
        let currentPdfPath = '';

        function canUseWebShare() {
          return typeof navigator !== 'undefined' && typeof navigator.share === 'function';
        }

        function renderShareMenu() {
          if (!shareMenu) {
            return;
          }
          if (!canUseWebShare()) {
            if (shareDetails) {
              shareDetails.hidden = true;
              shareDetails.removeAttribute('open');
            }
            shareMenu.classList.add('is-empty');
            shareMenu.innerHTML = '';
            return;
          }
          if (shareDetails) {
            shareDetails.hidden = false;
          }
          if (!currentPdfPath || !pagesInput.value.trim()) {
            shareMenu.classList.add('is-empty');
            shareMenu.innerHTML = '<div class="modal-share-empty">ページを指定してください</div>';
            return;
          }
          shareMenu.classList.remove('is-empty');
          shareMenu.innerHTML = `
            <button class="modal-share-link" type="button" id="pdf-modal-native-share">
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="currentColor" d="M18 16a3 3 0 0 0-2.24 1.01l-6.16-3.08a3.1 3.1 0 0 0 0-2.86l6.16-3.08A3 3 0 1 0 15 6c0 .27.04.53.11.78L9.08 9.86a3 3 0 1 0 0 4.28l6.03 3.08A3 3 0 1 0 18 16Z"/>
              </svg>
              <span>指定ページPDFを共有</span>
            </button>
          `;
          document.getElementById('pdf-modal-native-share')?.addEventListener('click', () => {
            void shareExportedPdf();
          });
        }

        function updateFullscreenButton() {
          if (!fullscreenButton || !modalPanel) {
            return;
          }
          fullscreenButton.textContent = document.fullscreenElement === modalPanel ? '全画面を終了' : '全画面';
        }

        async function exitFullscreenIfNeeded() {
          if (document.fullscreenElement === modalPanel && document.exitFullscreen) {
            try {
              await document.exitFullscreen();
            } catch (error) {
              console.warn('Failed to exit fullscreen', error);
            }
          }
        }

        async function toggleFullscreen() {
          if (!modalPanel) {
            return;
          }
          if (document.fullscreenElement === modalPanel) {
            await exitFullscreenIfNeeded();
            return;
          }
          if (modalPanel.requestFullscreen) {
            try {
              await modalPanel.requestFullscreen();
            } catch (error) {
              console.warn('Failed to enter fullscreen', error);
            }
          }
        }

        async function closeModal() {
          await exitFullscreenIfNeeded();
          modal.classList.remove('open');
          modal.setAttribute('aria-hidden', 'true');
          frame.src = 'about:blank';
          modal.querySelector('.modal-share')?.removeAttribute('open');
          chaptersWrap?.removeAttribute('open');
          updateFullscreenButton();
        }

        function normalizeExternalUrl(url) {
          const normalized = String(url || '').trim();
          if (!normalized || ['none', 'null', 'undefined'].includes(normalized.toLowerCase())) {
            return '';
          }
          try {
            const parsed = new URL(normalized, window.location.origin);
            return ['http:', 'https:'].includes(parsed.protocol) ? parsed.href : '';
          } catch (error) {
            return '';
          }
        }

        function setScrapboxLink(url) {
          const normalizedUrl = normalizeExternalUrl(url);
          if (normalizedUrl) {
            scrapboxLink.href = normalizedUrl;
            scrapboxLink.hidden = false;
          } else {
            scrapboxLink.hidden = true;
            scrapboxLink.removeAttribute('href');
          }
        }

        function setExportLink() {
          const pages = pagesInput.value.trim();
          const validationError = currentPdfPath && pages ? TsundokuPages.validatePageSpec(pages, currentPageCount) : '';
          const usable = Boolean(currentPdfPath && pages && !validationError);
          const links = [
            [exportLink, '/export-pdf'],
            [exportMdLink, '/export-md'],
          ];
          for (const [link, endpoint] of links) {
            if (!link) {
              continue;
            }
            if (!usable) {
              link.href = '#';
              link.removeAttribute('target');
              link.setAttribute('aria-disabled', 'true');
              continue;
            }
            const params = new URLSearchParams({
              pdf_path: currentPdfPath,
              pages,
            });
            link.href = `${endpoint}?${params.toString()}`;
            link.target = '_blank';
            link.removeAttribute('aria-disabled');
          }
          if (addWorkspaceButton) {
            addWorkspaceButton.disabled = !usable;
          }
          setExportStatus(validationError, true);
          renderShareMenu();
        }

        let chaptersRequestToken = 0;
        let currentPageCount = null;

        function clearChapterSelection() {
          if (chaptersMenu) {
            for (const input of chaptersMenu.querySelectorAll('input:checked')) {
              input.checked = false;
            }
          }
          pagesInput.value = '';
          updateChaptersSummary(0);
          setExportLink();
        }

        function updateChaptersSummary(selectedCount) {
          if (chaptersSummary) {
            chaptersSummary.textContent = selectedCount > 0 ? `章 ${selectedCount}件選択` : '章を選択';
          }
        }

        function resetChapters() {
          if (!chaptersWrap || !chaptersMenu) {
            return;
          }
          chaptersWrap.hidden = true;
          chaptersWrap.removeAttribute('open');
          chaptersMenu.innerHTML = '';
          updateChaptersSummary(0);
        }

        async function loadChapters(pdfPath) {
          resetChapters();
          currentPageCount = null;
          if (!chaptersWrap || !chaptersMenu || !pdfPath) {
            return;
          }
          const token = ++chaptersRequestToken;
          let chapters = [];
          let pageCount = null;
          try {
            const response = await fetch(`/pdf-outline?${new URLSearchParams({ pdf_path: pdfPath })}`);
            if (!response.ok) {
              return;
            }
            const payload = await response.json();
            chapters = Array.isArray(payload.chapters) ? payload.chapters : [];
            pageCount = Number.isInteger(payload.page_count) && payload.page_count > 0 ? payload.page_count : null;
          } catch (error) {
            console.warn('Failed to load PDF outline', error);
            return;
          }
          if (token !== chaptersRequestToken) {
            return;
          }
          currentPageCount = pageCount;
          setExportLink();
          if (chapters.length === 0) {
            return;
          }
          const clearButton = document.createElement('button');
          clearButton.type = 'button';
          clearButton.className = 'modal-chapters-clear';
          clearButton.textContent = '選択をクリア';
          clearButton.addEventListener('click', clearChapterSelection);
          chaptersMenu.appendChild(clearButton);
          for (const chapter of chapters) {
            const item = document.createElement('label');
            item.className = 'modal-chapter-item';
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.value = chapter.pages;
            const text = document.createElement('span');
            const indent = '　'.repeat(Math.max(0, (chapter.level || 1) - 1));
            const range = chapter.start_page === chapter.end_page
              ? `p.${chapter.start_page}`
              : `p.${chapter.start_page}-${chapter.end_page}`;
            text.textContent = `${indent}${chapter.title} (${range})`;
            item.appendChild(checkbox);
            item.appendChild(text);
            chaptersMenu.appendChild(item);
          }
          chaptersWrap.hidden = false;
        }

        function setExportStatus(message, isError = false) {
          if (exportStatus) {
            exportStatus.textContent = message || '';
            exportStatus.classList.toggle('is-error', Boolean(isError && message));
          }
        }

        function exportPdfUrl() {
          if (!currentPdfPath || !pagesInput.value.trim()) {
            return '';
          }
          const params = new URLSearchParams({
            pdf_path: currentPdfPath,
            pages: pagesInput.value.trim(),
          });
          return `/export-pdf?${params.toString()}`;
        }

        function filenameFromContentDisposition(header) {
          const utf8Match = /filename\*=UTF-8''([^;]+)/i.exec(header || '');
          if (utf8Match) {
            try {
              return decodeURIComponent(utf8Match[1]);
            } catch (error) {
              console.warn('Failed to decode filename', error);
            }
          }
          const asciiMatch = /filename="?([^";]+)"?/i.exec(header || '');
          return asciiMatch ? asciiMatch[1] : 'export.pdf';
        }

        function downloadBlob(blob, filename) {
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = filename || 'export.pdf';
          document.body.appendChild(link);
          link.click();
          link.remove();
          URL.revokeObjectURL(url);
        }

        async function fetchExportedPdfBlob() {
          const url = exportPdfUrl();
          if (!url) {
            throw new Error('ページを指定してください');
          }
          const response = await fetch(url, { headers: { 'Accept': 'application/pdf' } });
          if (!response.ok) {
            const message = await response.text().catch(() => '');
            throw new Error(message || 'PDFの作成に失敗しました');
          }
          return {
            blob: await response.blob(),
            filename: filenameFromContentDisposition(response.headers.get('Content-Disposition')),
          };
        }

        async function shareExportedPdf() {
          if (!canUseWebShare()) {
            return;
          }
          try {
            setExportStatus('指定ページPDFを作成中...');
            const { blob, filename } = await fetchExportedPdfBlob();
            const file = new File([blob], filename, { type: 'application/pdf' });
            if (typeof navigator.canShare === 'function' && navigator.canShare({ files: [file] })) {
              await navigator.share({
                title: title.textContent || 'PDF',
                files: [file],
              });
              setExportStatus('');
              return;
            }
            downloadBlob(blob, filename);
            setExportStatus('ファイル共有に対応していないため、ダウンロードしました。');
          } catch (error) {
            if (error instanceof DOMException && error.name === 'AbortError') {
              setExportStatus('');
              return;
            }
            setExportStatus(error instanceof Error ? error.message : '共有に失敗しました', true);
          } finally {
            shareDetails?.removeAttribute('open');
          }
        }

        function openModal(url, label, scrapboxUrl, pdfPath, pages, fromWorkspace = false) {
          frame.src = url;
          openLink.href = url;
          title.textContent = label || 'PDF';
          setScrapboxLink(scrapboxUrl);
          currentPdfPath = pdfPath || '';
          pagesInput.value = pages || '';
          if (addWorkspaceButton) {
            addWorkspaceButton.hidden = !fromWorkspace;
          }
          setExportLink();
          void loadChapters(currentPdfPath);
          renderShareMenu();
          modal.querySelector('.modal-share').removeAttribute('open');
          modal.classList.add('open');
          modal.setAttribute('aria-hidden', 'false');
          updateFullscreenButton();
        }

        document.addEventListener('click', (event) => {
          const trigger = event.target.closest('[data-pdf-modal-url]');
          if (!trigger) {
            return;
          }
          event.preventDefault();
          openModal(
            trigger.dataset.pdfModalUrl,
            trigger.dataset.pdfModalTitle,
            trigger.dataset.pdfModalScrapboxUrl,
            trigger.dataset.pdfModalPath,
            trigger.dataset.pdfModalPages,
            trigger.dataset.pdfModalWorkspace === '1',
          );
        });

        addWorkspaceButton?.addEventListener('click', () => {
          const pages = pagesInput.value.trim();
          if (!currentPdfPath || !pages) {
            return;
          }
          const error = TsundokuPages.validatePageSpec(pages, currentPageCount);
          if (error) {
            setExportStatus(error, true);
            return;
          }
          const cart = TsundokuCart.load();
          const entry = cart.books[currentPdfPath];
          if (entry) {
            entry.pages = TsundokuPages.mergeSpecs([entry.pages, pages]);
          } else {
            cart.books[currentPdfPath] = {
              title: title.textContent || currentPdfPath,
              pages: TsundokuPages.mergeSpecs([pages]),
              collapsed: false,
              addedAt: new Date().toISOString(),
            };
          }
          TsundokuCart.save(cart);
          setExportStatus('資料に追加しました');
          document.dispatchEvent(new CustomEvent('tsundoku-cart-updated'));
        });

        pagesInput.addEventListener('input', setExportLink);

        chaptersMenu?.addEventListener('change', () => {
          const selected = [...chaptersMenu.querySelectorAll('input:checked')].map((input) => input.value);
          pagesInput.value = TsundokuPages.mergeSpecs(selected);
          updateChaptersSummary(selected.length);
          setExportLink();
        });

        fullscreenButton?.addEventListener('click', () => {
          void toggleFullscreen();
        });
        document.addEventListener('fullscreenchange', updateFullscreenButton);
        updateFullscreenButton();

        closeButton.addEventListener('click', () => {
          void closeModal();
        });
        modal.addEventListener('click', (event) => {
          if (event.target === modal) {
            void closeModal();
          }
        });
        document.addEventListener('keydown', (event) => {
          if (event.key === 'Escape' && modal.classList.contains('open')) {
            void closeModal();
          }
        });
      })();
    </script>
  </body>
</html>
