<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}つんどけんさく{% endblock %}</title>
    <link rel="icon" href="/static/tsundokensaku-logo.png" type="image/png">
    <link rel="apple-touch-icon" href="/static/tsundokensaku-logo.png">
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --panel: #fffaf0;
        --text: #1f2328;
        --muted: #5f6b7a;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --border: #d7d2c8;
        --shadow: 0 12px 32px rgba(20, 30, 40, 0.08);
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 30%),
          radial-gradient(circle at top right, rgba(180, 83, 9, 0.10), transparent 24%),
          var(--bg);
      }

      a { color: var(--accent-strong); text-decoration: none; }
      a:hover { text-decoration: underline; }

      .shell {
        max-width: 1080px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        justify-self: center;
      }

      .brand-link {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--text);
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(255, 250, 240, 0.95), rgba(245, 241, 232, 0.9));
        border: 1px solid rgba(140, 158, 168, 0.38);
        box-shadow: var(--shadow);
      }

      .brand-link:hover {
        text-decoration: none;
      }

      .brand-mark {
        width: 56px;
        height: 56px;
        border-radius: 12px;
        object-fit: cover;
        box-shadow: var(--shadow);
      }

      .brand-text {
        display: grid;
        gap: 4px;
      }

      .brand h1 {
        margin: 0;
        font-size: clamp(1.4rem, 2vw, 2.2rem);
        letter-spacing: -0.02em;
        font-weight: 700;
        color: #24415b;
      }

      .meta,
      .muted {
        margin: 0;
        color: var(--muted);
      }

      .nav {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-self: end;
      }

      .topbar > [aria-hidden="true"] {
        width: 1px;
        height: 1px;
      }

      .nav a,
      button,
      .button {
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        padding: 10px 14px;
        border-radius: 999px;
        box-shadow: var(--shadow);
        font: inherit;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
        line-height: 1.2;
      }

      .nav a.active,
      button.primary,
      .button.primary {
        background: var(--accent);
        color: white;
        border-color: transparent;
      }

      .card {
        background: rgba(255, 250, 240, 0.88);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(215, 210, 200, 0.9);
        border-radius: 24px;
        box-shadow: var(--shadow);
        padding: 20px;
        margin-bottom: 20px;
      }

      .collapsible-card {
        padding: 0;
        overflow: hidden;
      }

      .collapsible-card > summary {
        list-style: none;
        cursor: pointer;
        padding: 20px;
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--text);
      }

      .collapsible-card > summary::-webkit-details-marker {
        display: none;
      }

      .collapsible-card > summary::after {
        content: "▾";
        float: right;
        color: var(--muted);
        transition: transform 0.2s ease;
      }

      .collapsible-card[open] > summary::after {
        transform: rotate(180deg);
      }

      .collapsible-card > .card-body {
        padding: 0 20px 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      .stat {
        padding: 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.75);
        border: 1px solid var(--border);
      }

      .stat .label { color: var(--muted); font-size: 0.92rem; }
      .stat .value { font-size: 2rem; font-weight: 700; margin-top: 6px; }

      .progress-shell {
        display: grid;
        gap: 10px;
      }

      .progress {
        width: 100%;
        height: 14px;
        border-radius: 999px;
        background: rgba(95, 107, 122, 0.16);
        overflow: hidden;
        border: 1px solid var(--border);
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), #2ea99a);
        transition: width 0.25s ease;
      }

      form.search {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      input[type="search"] {
        flex: 1 1 280px;
        border: 1px solid var(--border);
        background: white;
        border-radius: 16px;
        padding: 14px 16px;
        font: inherit;
      }

      select {
        border: 1px solid var(--border);
        background: white;
        border-radius: 16px;
        padding: 14px 16px;
        font: inherit;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th, td {
        text-align: left;
        border-bottom: 1px solid var(--border);
        padding: 12px 8px;
        vertical-align: top;
      }

      th { color: var(--muted); font-weight: 600; }

      .action-cell {
        white-space: nowrap;
        width: 1%;
      }

      .timestamp-cell {
        white-space: nowrap;
      }

      .kindle-table th:nth-child(2),
      .kindle-table td:nth-child(2) {
        white-space: nowrap;
      }

      .kindle-table th:nth-child(3),
      .kindle-table td:nth-child(3) {
        white-space: nowrap;
        width: 1%;
      }

      .kindle-table th:nth-child(4),
      .kindle-table td:nth-child(4),
      .kindle-table th:nth-child(5),
      .kindle-table td:nth-child(5) {
        width: 1%;
      }

      .pill {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(15, 118, 110, 0.1);
        color: var(--accent-strong);
        font-size: 0.88rem;
      }

      .results {
        display: grid;
        gap: 14px;
      }

      .result {
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(255,255,255,0.74);
      }

      .result-layout {
        display: grid;
        grid-template-columns: 96px 1fr;
        gap: 16px;
        align-items: start;
      }

      .result-cover {
        width: 96px;
      }

      .cover-thumb,
      .cover-placeholder {
        width: 96px;
        height: 136px;
        border-radius: 12px;
        display: block;
        object-fit: cover;
        background: linear-gradient(135deg, rgba(15, 118, 110, 0.12), rgba(180, 83, 9, 0.12));
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
      }

      .result-body {
        min-width: 0;
      }

      .result-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin: 8px 0 6px;
      }

      .page-links {
        margin-top: 10px;
      }

      .result h3 {
        margin: 0 0 6px;
        font-size: 1.04rem;
      }

      .snippet {
        white-space: pre-wrap;
        line-height: 1.55;
        margin-top: 10px;
      }

      mark {
        background: rgba(245, 158, 11, 0.28);
        color: inherit;
        padding: 0 0.08em;
        border-radius: 0.18em;
      }

      .footer {
        margin-top: 28px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .viewer-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }

      .viewer-header h2 {
        margin: 4px 0 0;
        font-size: 1rem;
        overflow-wrap: anywhere;
      }

      .viewer-frame {
        height: calc(100vh - 190px);
        min-height: 520px;
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        background: white;
        box-shadow: var(--shadow);
      }

      .viewer-frame iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }

      .settings-layout {
        display: grid;
        grid-template-columns: 200px minmax(0, 1fr);
        gap: 20px;
        align-items: start;
      }

      .settings-sidebar {
        display: grid;
        gap: 10px;
        align-self: start;
      }

      .settings-nav {
        display: grid;
        gap: 8px;
      }

      .settings-nav a {
        display: block;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.64);
        text-decoration: none;
        color: inherit;
      }

      .settings-nav a.active {
        border-color: var(--accent);
        background: rgba(61, 98, 176, 0.08);
      }

      .settings-sidebar .stat {
        margin: 0;
        padding: 12px;
        border-radius: 14px;
      }

      .settings-sidebar .stat .label {
        font-size: 0.78rem;
      }

      .settings-sidebar .stat .value {
        font-size: 1.1rem;
        margin-top: 4px;
      }

      .settings-sidebar .grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        background: rgba(17, 24, 39, 0.58);
        z-index: 1000;
      }

      .modal.open {
        display: flex;
      }

      .modal-panel {
        width: min(1200px, 100%);
        height: min(92vh, 980px);
        background: white;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.35);
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .modal-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }

      .modal-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .modal-share {
        position: relative;
      }

      .modal-share > summary {
        list-style: none;
        cursor: pointer;
      }

      .modal-share > summary::-webkit-details-marker {
        display: none;
      }

      .modal-share-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 38px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: white;
        color: var(--text);
        box-shadow: var(--shadow);
      }

      .modal-share-menu {
        position: absolute;
        right: 0;
        top: calc(100% + 8px);
        min-width: 220px;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: white;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.18);
        z-index: 10;
      }

      .modal-share-menu.is-empty {
        min-width: 160px;
      }

      .modal-share-link {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        text-decoration: none;
        color: inherit;
      }

      .modal-share-link:hover {
        background: var(--panel);
      }

      .modal-share-link svg {
        width: 20px;
        height: 20px;
        flex: none;
      }

      .modal-share-empty {
        padding: 10px 12px;
        color: var(--muted);
      }

      .modal-title {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .modal-panel:fullscreen {
        width: 100vw;
        height: 100vh;
        max-width: none;
        border-radius: 0;
      }

      .modal-panel:fullscreen .modal-viewport {
        background: white;
      }

      .modal-pages {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 0 2px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .modal-pages input {
        width: 120px;
        padding: 7px 9px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: white;
        font: inherit;
      }

      .modal-viewport {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: white;
      }

      @media (max-width: 640px) {
        .shell { padding: 16px 12px 32px; }
        .brand-mark { width: 48px; height: 48px; }
        .topbar { grid-template-columns: 1fr; justify-items: center; }
        .topbar > [aria-hidden="true"] { display: none; }
        .brand { justify-self: center; }
        .nav { justify-self: center; }
        .settings-layout { grid-template-columns: 1fr; }
        .settings-sidebar { position: static; }
        .card { padding: 16px; border-radius: 18px; }
        th, td { padding: 10px 6px; }
        .viewer-header { align-items: flex-start; flex-direction: column; }
        .viewer-frame { height: calc(100vh - 230px); min-height: 420px; }
        .result-layout { grid-template-columns: 72px 1fr; gap: 12px; }
        .result-cover,
        .cover-thumb,
        .cover-placeholder { width: 72px; height: 102px; }
        .progress { height: 12px; }
        .modal { padding: 8px; }
        .modal-panel { height: 96vh; border-radius: 10px; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <div aria-hidden="true"></div>
        <div class="brand">
          <a class="brand-link" href="/" aria-label="ホームへ戻る">
            <img class="brand-mark" src="/static/tsundokensaku-logo.png" alt="">
            <div class="brand-text">
              <h1>つんどけんさく</h1>
            </div>
          </a>
        </div>
        <nav class="nav">
          <a href="/settings" class="{% if request.url.path.startswith('/settings') or request.url.path == '/manage' %}active{% endif %}">設定</a>
        </nav>
      </div>
      {% block content %}{% endblock %}
    </div>
      <div class="modal" id="pdf-modal" aria-hidden="true">
        <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="pdf-modal-title">
          <div class="modal-bar">
            <div class="modal-title" id="pdf-modal-title"></div>
            <div class="modal-actions">
              <label class="modal-pages">
                <span>ページ</span>
                <input id="pdf-modal-pages" type="text" inputmode="numeric" placeholder="11-15,18">
              </label>
              <a class="button" id="pdf-modal-export" href="#" target="_blank" rel="noreferrer">切り出し</a>
              <button type="button" id="pdf-modal-fullscreen">全画面</button>
              <details class="modal-share">
                <summary class="modal-share-button" aria-label="シェア">
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path fill="currentColor" d="M18 16a3 3 0 0 0-2.24 1.01l-6.16-3.08a3.1 3.1 0 0 0 0-2.86l6.16-3.08A3 3 0 1 0 15 6c0 .27.04.53.11.78L9.08 9.86a3 3 0 1 0 0 4.28l6.03 3.08A3 3 0 1 0 18 16Zm0-10a1 1 0 1 1 0 2 1 1 0 0 1 0-2Zm-12 8a1 1 0 1 1 0-2 1 1 0 0 1 0 2Zm12 4a1 1 0 1 1 0-2 1 1 0 0 1 0 2Z"/>
                  </svg>
                </summary>
                <div class="modal-share-menu" id="pdf-modal-share-menu"></div>
              </details>
              <a class="button" id="pdf-modal-open" href="#" target="_blank" rel="noreferrer">PDFを開く</a>
              <a class="button" id="pdf-modal-scrapbox" href="#" target="_blank" rel="noreferrer" hidden>Scrapboxで開く</a>
              <button type="button" id="pdf-modal-close">閉じる</button>
            </div>
          </div>
          <iframe class="modal-viewport" id="pdf-modal-frame" title="PDF viewer"></iframe>
        </div>
      </div>
    <script>
      (() => {
        const modal = document.getElementById('pdf-modal');
        const modalPanel = modal?.querySelector('.modal-panel');
        const frame = document.getElementById('pdf-modal-frame');
        const title = document.getElementById('pdf-modal-title');
        const pagesInput = document.getElementById('pdf-modal-pages');
        const exportLink = document.getElementById('pdf-modal-export');
        const fullscreenButton = document.getElementById('pdf-modal-fullscreen');
        const openLink = document.getElementById('pdf-modal-open');
        const shareMenu = document.getElementById('pdf-modal-share-menu');
        const scrapboxLink = document.getElementById('pdf-modal-scrapbox');
        const closeButton = document.getElementById('pdf-modal-close');
        let currentPdfPath = '';

        const SHARE_TARGETS = [

            id: 'notebooklm',

          {

          {

            `,
          },
          {
            id: 'google-drive',
            label: 'Google Drive',
            href: 'https://drive.google.com/drive/my-drive',
            icon: `
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="#fbbc05" d="M8.4 4h4.8L20 16.1l-2.4 4.1H4.8L2 16.1z"/>
                <path fill="#34a853" d="M9.6 4h4.8l6 12.1h-4.8z"/>
                <path fill="#4285f4" d="M4.8 20.2 11.2 9.5l2.4 4.1-4 6.6z"/>
              </svg>
            `,
          },
          {
            id: 'onedrive',
            label: 'OneDrive',
            href: 'https://onedrive.live.com/',
            icon: `
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="#0284c7" d="M10.5 9.2a4.7 4.7 0 0 1 7.8 1.2 4 4 0 0 1-1.5 7.7H7.2a3.7 3.7 0 0 1-1.6-7 4.7 4.7 0 0 1 4.9-1.9z"/>
              </svg>
            `,
          },
          {
            id: 'dropbox',
            label: 'Dropbox',
            href: 'https://www.dropbox.com/home',
            icon: `
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="#2563eb" d="M7 4l5 3.1L7 10.2 2 7.1 7 4Zm10 0l5 3.1-5 3.1-5-3.1L17 4ZM7 11.2l5 3.1-5 3.1-5-3.1 5-3.1Zm10 0l5 3.1-5 3.1-5-3.1 5-3.1ZM12 17.6l5 3.1-5 3.1-5-3.1 5-3.1Z"/>
              </svg>
            `,
          },
          {
            id: 'evernote',
            label: 'Evernote',
            href: 'https://www.evernote.com/',
            icon: `
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="#22c55e" d="M7 3h7l5 5v13H7z"/>
                <path fill="currentColor" d="M14 3v5h5"/>
                <path fill="currentColor" d="M10 12h6v1.8h-6zm0 3h4v1.8h-4z"/>
              </svg>
            `,
          },
        ];
        const SHARE_STORAGE_KEY = 'tsundokensaku-share-targets';

        function getEnabledShareTargetIds() {
          try {
            const raw = localStorage.getItem(SHARE_STORAGE_KEY);
            if (!raw) {
              return SHARE_TARGETS.map((target) => target.id);
            }
            const parsed = JSON.parse(raw);
            if (!Array.isArray(parsed)) {
              return SHARE_TARGETS.map((target) => target.id);
            }
            return parsed.filter((value) => typeof value === 'string' && value);
          } catch (error) {
            console.warn('Failed to read share settings', error);
            return SHARE_TARGETS.map((target) => target.id);
          }
        }

        function renderShareMenu() {
          if (!shareMenu) {
            return;
          }
          const enabledIds = new Set(getEnabledShareTargetIds());
          const targets = SHARE_TARGETS.filter((target) => enabledIds.has(target.id));
          if (!targets.length) {
            shareMenu.classList.add('is-empty');
            shareMenu.innerHTML = '<div class="modal-share-empty">共有先が未設定です</div>';
            return;
          }
          shareMenu.classList.remove('is-empty');
          shareMenu.innerHTML = targets
            .map(
              (target) => `
                <a class="modal-share-link" href="${target.href}" target="_blank" rel="noreferrer">
                  ${target.icon}
                  <span>${target.label}</span>
                </a>
              `,
            )
            .join('');
        }

        function updateFullscreenButton() {
          if (!fullscreenButton || !modalPanel) {
            return;
          }
          fullscreenButton.textContent = document.fullscreenElement === modalPanel ? '全画面を終了' : '全画面';
        }

        async function exitFullscreenIfNeeded() {
          if (document.fullscreenElement === modalPanel && document.exitFullscreen) {
            try {
              await document.exitFullscreen();
            } catch (error) {
              console.warn('Failed to exit fullscreen', error);
            }
          }
        }

        async function toggleFullscreen() {
          if (!modalPanel) {
            return;
          }
          if (document.fullscreenElement === modalPanel) {
            await exitFullscreenIfNeeded();
            return;
          }
          if (modalPanel.requestFullscreen) {
            try {
              await modalPanel.requestFullscreen();
            } catch (error) {
              console.warn('Failed to enter fullscreen', error);
            }
          }
        }

        async function closeModal() {
          await exitFullscreenIfNeeded();
          modal.classList.remove('open');
          modal.setAttribute('aria-hidden', 'true');
          frame.src = 'about:blank';
          modal.querySelector('.modal-share')?.removeAttribute('open');
          updateFullscreenButton();
        }

        function setScrapboxLink(url) {
          if (url) {
            scrapboxLink.href = url;
            scrapboxLink.hidden = false;
          } else {
            scrapboxLink.hidden = true;
            scrapboxLink.removeAttribute('href');
          }
        }

        function setExportLink() {
          if (!currentPdfPath) {
            exportLink.href = '#';
            exportLink.removeAttribute('target');
            exportLink.setAttribute('aria-disabled', 'true');
            return;
          }
          const pages = pagesInput.value.trim();
          if (!pages) {
            exportLink.href = '#';
            exportLink.removeAttribute('target');
            exportLink.setAttribute('aria-disabled', 'true');
            return;
          }
          const params = new URLSearchParams({
            pdf_path: currentPdfPath,
            pages,
          });
          exportLink.href = `/export-pdf?${params.toString()}`;
          exportLink.target = '_blank';
          exportLink.removeAttribute('aria-disabled');
        }

        function openModal(url, label, scrapboxUrl, pdfPath, pages) {
          frame.src = url;
          openLink.href = url;
          title.textContent = label || 'PDF';
          setScrapboxLink(scrapboxUrl);
          currentPdfPath = pdfPath || '';
          pagesInput.value = pages || '';
          setExportLink();
          renderShareMenu();
          modal.querySelector('.modal-share').removeAttribute('open');
          modal.classList.add('open');
          modal.setAttribute('aria-hidden', 'false');
          updateFullscreenButton();
        }

        document.addEventListener('click', (event) => {
          const trigger = event.target.closest('[data-pdf-modal-url]');
          if (!trigger) {
            return;
          }
          event.preventDefault();
          openModal(
            trigger.dataset.pdfModalUrl,
            trigger.dataset.pdfModalTitle,
            trigger.dataset.pdfModalScrapboxUrl,
            trigger.dataset.pdfModalPath,
            trigger.dataset.pdfModalPages,
          );
        });

        pagesInput.addEventListener('input', setExportLink);

        fullscreenButton?.addEventListener('click', () => {
          void toggleFullscreen();
        });
        document.addEventListener('fullscreenchange', updateFullscreenButton);
        updateFullscreenButton();

        closeButton.addEventListener('click', () => {
          void closeModal();
        });
        modal.addEventListener('click', (event) => {
          if (event.target === modal) {
            void closeModal();
          }
        });
        document.addEventListener('keydown', (event) => {
          if (event.key === 'Escape' && modal.classList.contains('open')) {
            void closeModal();
          }
        });
      })();
    </script>
  </body>
</html>
