<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}つんどけんさく{% endblock %}</title>
    <link rel="icon" href="/static/tsundokensaku-logo.png" type="image/png">
    <link rel="apple-touch-icon" href="/static/tsundokensaku-logo.png">
    <script src="/static/pages-spec.js"></script>
    <script src="/static/pack-store.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --panel: #fffaf0;
        --text: #1f2328;
        --muted: #5f6b7a;
        --accent: #0f766e;
        --accent-strong: #115e59;
        --border: #d7d2c8;
        --shadow: 0 12px 32px rgba(20, 30, 40, 0.08);
      }

      * { box-sizing: border-box; }

      [hidden] {
        display: none !important;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(15, 118, 110, 0.12), transparent 30%),
          radial-gradient(circle at top right, rgba(180, 83, 9, 0.10), transparent 24%),
          var(--bg);
      }

      a { color: var(--accent-strong); text-decoration: none; }
      a:hover { text-decoration: underline; }

      .shell {
        max-width: 1080px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
        position: relative;
        z-index: 20;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        justify-self: center;
      }

      .brand-link {
        display: flex;
        align-items: center;
        gap: 12px;
        color: var(--text);
        text-decoration: none;
        padding: 8px 16px;
        border-radius: 999px;
        background: linear-gradient(180deg, rgba(255, 250, 240, 0.95), rgba(245, 241, 232, 0.9));
        border: 1px solid rgba(140, 158, 168, 0.38);
        box-shadow: var(--shadow);
      }

      .brand-link:hover {
        text-decoration: none;
      }

      .brand-mark {
        width: 56px;
        height: 56px;
        border-radius: 12px;
        object-fit: cover;
        box-shadow: var(--shadow);
      }

      .brand-text {
        display: grid;
        gap: 4px;
      }

      .brand h1 {
        margin: 0;
        font-size: clamp(1.4rem, 2vw, 2.2rem);
        letter-spacing: -0.02em;
        font-weight: 700;
        color: #24415b;
      }

      .meta,
      .muted {
        margin: 0;
        color: var(--muted);
      }

      .nav {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-self: end;
        position: relative;
        z-index: 21;
      }

      .topbar > [aria-hidden="true"] {
        width: 1px;
        height: 1px;
      }

      .nav a,
      button,
      .button {
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        padding: 10px 14px;
        border-radius: 999px;
        box-shadow: var(--shadow);
        font: inherit;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
        line-height: 1.2;
      }

      .nav a {
        min-width: 88px;
      }

      .nav a.active,
      button.primary,
      .button.primary {
        background: var(--accent);
        color: white;
        border-color: transparent;
      }

      .card {
        background: rgba(255, 250, 240, 0.88);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(215, 210, 200, 0.9);
        border-radius: 24px;
        box-shadow: var(--shadow);
        padding: 20px;
        margin-bottom: 20px;
      }

      .collapsible-card {
        padding: 0;
        overflow: hidden;
      }

      .collapsible-card > summary {
        list-style: none;
        cursor: pointer;
        padding: 20px;
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--text);
      }

      .collapsible-card > summary::-webkit-details-marker {
        display: none;
      }

      .collapsible-card > summary::after {
        content: "▾";
        float: right;
        color: var(--muted);
        transition: transform 0.2s ease;
      }

      .collapsible-card[open] > summary::after {
        transform: rotate(180deg);
      }

      .collapsible-card > .card-body {
        padding: 0 20px 20px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      .stat {
        padding: 18px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.75);
        border: 1px solid var(--border);
      }

      .stat .label { color: var(--muted); font-size: 0.92rem; }
      .stat .value { font-size: 2rem; font-weight: 700; margin-top: 6px; }

      .progress-shell {
        display: grid;
        gap: 10px;
      }

      .progress {
        width: 100%;
        height: 14px;
        border-radius: 999px;
        background: rgba(95, 107, 122, 0.16);
        overflow: hidden;
        border: 1px solid var(--border);
      }

      .progress-fill {
        height: 100%;
        width: 0%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--accent), #2ea99a);
        transition: width 0.25s ease;
      }

      form.search {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      input[type="search"] {
        flex: 1 1 280px;
        border: 1px solid var(--border);
        background: white;
        border-radius: 16px;
        padding: 14px 16px;
        font: inherit;
      }

      select {
        border: 1px solid var(--border);
        background: white;
        border-radius: 16px;
        padding: 14px 16px;
        font: inherit;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th, td {
        text-align: left;
        border-bottom: 1px solid var(--border);
        padding: 12px 8px;
        vertical-align: top;
      }

      th { color: var(--muted); font-weight: 600; }

      .action-cell {
        white-space: nowrap;
        width: 1%;
      }

      .timestamp-cell {
        white-space: nowrap;
      }

      .kindle-table th:nth-child(2),
      .kindle-table td:nth-child(2) {
        white-space: nowrap;
      }

      .kindle-table th:nth-child(3),
      .kindle-table td:nth-child(3) {
        white-space: nowrap;
        width: 1%;
      }

      .kindle-table th:nth-child(4),
      .kindle-table td:nth-child(4),
      .kindle-table th:nth-child(5),
      .kindle-table td:nth-child(5) {
        width: 1%;
      }

      .pill {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(15, 118, 110, 0.1);
        color: var(--accent-strong);
        font-size: 0.88rem;
      }

      .results {
        display: grid;
        gap: 14px;
      }

      .result {
        padding: 16px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(255,255,255,0.74);
      }

      .result-layout {
        display: grid;
        grid-template-columns: 96px 1fr;
        gap: 16px;
        align-items: start;
      }

      .result-layout.no-cover {
        grid-template-columns: 1fr;
      }

      .result-cover {
        width: 96px;
      }

      .cover-thumb {
        width: 96px;
        height: 136px;
        border-radius: 12px;
        display: block;
        object-fit: cover;
        background: linear-gradient(135deg, rgba(15, 118, 110, 0.12), rgba(180, 83, 9, 0.12));
        border: 1px solid var(--border);
        box-shadow: var(--shadow);
      }

      .result-body {
        min-width: 0;
      }

      .result-actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin: 8px 0 6px;
      }

      .page-links {
        margin-top: 10px;
      }

      .result h3 {
        margin: 0 0 6px;
        font-size: 1.04rem;
      }

      .snippet {
        white-space: pre-wrap;
        line-height: 1.55;
        margin-top: 10px;
      }

      mark {
        background: rgba(245, 158, 11, 0.28);
        color: inherit;
        padding: 0 0.08em;
        border-radius: 0.18em;
      }

      .footer {
        margin-top: 28px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .cart-toggle {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--panel);
        box-shadow: var(--shadow);
        cursor: pointer;
        line-height: 1.2;
      }

      .cart-bar {
        position: sticky;
        bottom: 12px;
        z-index: 30;
        border-color: var(--accent);
      }

      .cart-summary {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .cart-status {
        font-size: 0.88rem;
        overflow-wrap: anywhere;
      }

      .nav a .pill {
        margin-left: 6px;
        padding: 2px 8px;
        background: var(--accent);
        color: white;
        font-weight: 600;
      }

      .nav a.active .pill {
        background: white;
        color: var(--accent-strong);
      }

      .ws-toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .ws-status {
        flex-basis: 100%;
        color: var(--muted);
        font-size: 0.88rem;
        overflow-wrap: anywhere;
      }

      .ws-status.is-error,
      .ws-error {
        color: #b91c1c;
        background: rgba(220, 38, 38, 0.08);
        border: 1px solid rgba(220, 38, 38, 0.28);
        border-radius: 8px;
        padding: 6px 10px;
        font-size: 0.88rem;
      }

      .ws-status.is-error::before,
      .ws-error::before {
        content: "⚠ ";
      }

      .ws-book {
        border: 1px solid var(--border);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.75);
        margin-bottom: 12px;
        overflow: hidden;
      }

      .ws-book > summary {
        list-style: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 14px 16px;
      }

      .ws-book > summary::-webkit-details-marker {
        display: none;
      }

      .ws-book > summary::before {
        content: "▸";
        color: var(--muted);
      }

      .ws-book[open] > summary::before {
        content: "▾";
      }

      .ws-book-title {
        flex: 1;
        min-width: 0;
        font-weight: 600;
        overflow-wrap: anywhere;
      }

      .ws-book-body {
        padding: 0 16px 16px;
        display: grid;
        gap: 10px;
      }

      .ws-pages-row {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .ws-pages-row input {
        flex: 1 1 200px;
        max-width: 320px;
        padding: 7px 9px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: white;
        font: inherit;
      }

      .ws-chapters {
        display: grid;
        gap: 2px;
        max-height: 280px;
        overflow-y: auto;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 8px;
        background: white;
      }

      .ws-chapters-caption {
        color: var(--muted);
        font-size: 0.88rem;
      }

      .ws-page-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }

      .ws-page-chip {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 4px 3px 10px;
        border-radius: 999px;
        background: rgba(15, 118, 110, 0.1);
        color: var(--accent-strong);
        font-size: 0.85rem;
      }

      .ws-page-chip-remove {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        padding: 0;
        border: 0;
        border-radius: 50%;
        background: transparent;
        box-shadow: none;
        color: inherit;
        font-size: 0.9rem;
        line-height: 1;
        cursor: pointer;
      }

      .ws-page-chip-remove:hover {
        background: rgba(15, 118, 110, 0.22);
      }

      .ws-page-chips-toggle {
        padding: 3px 10px;
        font-size: 0.85rem;
        border-radius: 999px;
      }

      .ws-page-chips-empty {
        color: var(--muted);
        font-size: 0.85rem;
      }

      .ws-remove {
        padding: 6px 12px;
        font-size: 0.88rem;
      }

      .modal-panel.ws-add-panel {
        width: min(720px, 100%);
        height: auto;
        max-height: min(85vh, 900px);
        grid-template-rows: auto auto minmax(0, 1fr) auto;
      }

      .ws-add-form {
        display: flex;
        gap: 8px;
        padding: 12px;
        border-bottom: 1px solid var(--border);
      }

      .ws-add-form input[type="search"] {
        flex: 1;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font: inherit;
      }

      .ws-add-form select {
        max-width: 220px;
        padding: 10px 12px;
        border-radius: 10px;
      }

      .ws-add-results {
        overflow-y: auto;
        padding: 12px;
        display: grid;
        gap: 10px;
        align-content: start;
        min-height: 160px;
      }

      .ws-add-book-title {
        font-weight: 600;
        margin-bottom: 4px;
      }

      .ws-add-row-added {
        color: var(--muted);
        cursor: default;
      }

      .ws-add-footer {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        padding: 12px;
        border-top: 1px solid var(--border);
      }

      .viewer-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }

      .viewer-header h2 {
        margin: 4px 0 0;
        font-size: 1rem;
        overflow-wrap: anywhere;
      }

      .viewer-frame {
        height: calc(100vh - 190px);
        min-height: 520px;
        border: 1px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        background: white;
        box-shadow: var(--shadow);
      }

      .viewer-frame iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }

      .settings-layout {
        display: grid;
        grid-template-columns: 200px minmax(0, 1fr);
        gap: 20px;
        align-items: start;
      }

      .settings-sidebar {
        display: grid;
        gap: 10px;
        align-self: start;
      }

      .settings-nav {
        display: grid;
        gap: 8px;
      }

      .settings-nav a {
        display: block;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.64);
        text-decoration: none;
        color: inherit;
      }

      .settings-nav a.active {
        border-color: var(--accent);
        background: rgba(61, 98, 176, 0.08);
      }

      .settings-sidebar .stat {
        margin: 0;
        padding: 12px;
        border-radius: 14px;
      }

      .settings-sidebar .stat .label {
        font-size: 0.78rem;
      }

      .settings-sidebar .stat .value {
        font-size: 1.1rem;
        margin-top: 4px;
      }

      .settings-sidebar .grid {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .modal {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        padding: 18px;
        background: rgba(17, 24, 39, 0.58);
        z-index: 1000;
      }

      .modal.open {
        display: flex;
      }

      .modal-panel {
        position: relative;
        width: min(1200px, 100%);
        height: min(92vh, 980px);
        background: white;
        border-radius: 14px;
        overflow: hidden;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.35);
        display: grid;
        grid-template-rows: auto auto 1fr;
        grid-template-columns: minmax(0, 1fr);
      }

      .modal-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--panel);
      }

      .modal-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .modal-export-status {
        flex-basis: 100%;
        color: var(--muted);
        font-size: 0.86rem;
        overflow-wrap: anywhere;
        text-align: right;
      }

      .modal-export-status.is-error {
        color: #b91c1c;
        background: rgba(220, 38, 38, 0.08);
        border: 1px solid rgba(220, 38, 38, 0.28);
        border-radius: 8px;
        padding: 6px 10px;
      }

      .modal-export-status.is-error::before {
        content: "⚠ ";
      }

      .modal-share {
        position: relative;
      }

      .modal-assemble-actions {
        justify-content: flex-start;
        flex: 1;
      }

      .modal-assemble-actions .modal-export-status {
        text-align: left;
      }

      #pdf-modal-export-wrap .modal-share-menu {
        left: 0;
        right: auto;
      }

      .modal-share > summary {
        list-style: none;
        cursor: pointer;
      }

      .modal-share > summary::-webkit-details-marker {
        display: none;
      }

      .modal-share-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 38px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: white;
        color: var(--text);
        box-shadow: var(--shadow);
      }

      .modal-share-menu {
        position: absolute;
        right: 0;
        top: calc(100% + 8px);
        min-width: 220px;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: white;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.18);
        z-index: 10;
      }

      .modal-share-menu.is-empty {
        min-width: 160px;
      }

      .modal-share-link {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        border: 0;
        background: transparent;
        box-shadow: none;
        padding: 10px 12px;
        border-radius: 10px;
        text-decoration: none;
        color: inherit;
        cursor: pointer;
        font: inherit;
        text-align: left;
      }

      .modal-share-link:hover {
        background: var(--panel);
      }

      .modal-share-link svg {
        width: 20px;
        height: 20px;
        flex: none;
      }

      .modal-share-empty {
        padding: 10px 12px;
        color: var(--muted);
      }

      .modal-title {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .modal-panel:fullscreen {
        width: 100vw;
        height: 100vh;
        max-width: none;
        border-radius: 0;
      }

      .modal-panel:fullscreen .modal-viewport {
        background: white;
      }

      .modal-pages {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 0 2px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .modal-pages input {
        width: 120px;
        padding: 7px 9px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: white;
        font: inherit;
      }

      .modal-chapters {
        position: relative;
      }

      .modal-chapters > summary {
        list-style: none;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        border: 1px solid var(--border);
        background: white;
        color: var(--text);
        padding: 7px 12px;
        border-radius: 8px;
        font-size: 0.92rem;
        white-space: nowrap;
      }

      .modal-chapters > summary::-webkit-details-marker {
        display: none;
      }

      .modal-chapters-menu {
        position: absolute;
        left: 0;
        top: calc(100% + 8px);
        min-width: 300px;
        max-width: 420px;
        max-height: 50vh;
        overflow-y: auto;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: white;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.18);
        z-index: 10;
      }

      .modal-chapter-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 7px 10px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.92rem;
      }

      .modal-chapter-item:hover {
        background: var(--panel);
      }

      .modal-chapters-clear {
        display: block;
        width: 100%;
        border: 0;
        background: transparent;
        box-shadow: none;
        padding: 7px 10px;
        border-radius: 8px;
        color: var(--accent-strong);
        cursor: pointer;
        font-size: 0.92rem;
        text-align: left;
      }

      .modal-chapters-clear:hover {
        background: var(--panel);
      }

      .modal-chapter-item input {
        flex: none;
      }

      .modal-chapter-item span {
        overflow-wrap: anywhere;
      }

      .modal-viewport {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: white;
      }

      .modal-thumb-heading {
        font-weight: 600;
        white-space: nowrap;
      }

      .modal-thumb-panel {
        grid-row: 3;
        grid-column: 1;
        width: 100%;
        height: 100%;
        background: white;
        padding: 16px;
        overflow-y: auto;
      }

      .modal-thumb-panel.detail-open {
        overflow: hidden;
      }

      .modal-thumb-scroll {
        display: flex;
        flex-direction: column;
        gap: 16px;
        align-items: center;
      }

      .modal-thumb-range-toggle {
        display: flex;
        justify-content: center;
        width: 100%;
      }

      .modal-thumb-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 16px;
        width: 100%;
      }

      .modal-thumb-item {
        position: relative;
        display: block;
        border: 3px solid var(--border);
        border-radius: 8px;
        overflow: hidden;
        background: white;
      }

      .modal-thumb-item.current-page {
        border-color: #b45309;
      }

      .modal-thumb-item.selected {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.25);
      }

      .modal-thumb-item img {
        width: 100%;
        display: block;
      }

      .modal-thumb-checkbox {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        opacity: 0;
      }

      .modal-thumb-checkbox:focus-visible + .modal-thumb-check-badge {
        outline: 3px solid rgba(61, 98, 176, 0.95);
        outline-offset: 3px;
      }

      .modal-thumb-check-control {
        position: absolute;
        top: 8px;
        left: 8px;
        z-index: 2;
        display: inline-flex;
        width: 40px;
        height: 40px;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .modal-thumb-check-badge {
        display: flex;
        width: 26px;
        height: 26px;
        border-radius: 50%;
        border: 2px solid rgba(15, 23, 42, 0.35);
        background: rgba(255, 255, 255, 0.9);
        color: transparent;
        align-items: center;
        justify-content: center;
        font-size: 0.9rem;
        box-shadow: 0 2px 8px rgba(15, 23, 42, 0.18);
      }

      .modal-thumb-item.selected .modal-thumb-check-badge {
        border-color: var(--accent);
        background: var(--accent);
        color: white;
      }

      .modal-thumb-page-label {
        position: absolute;
        bottom: 44px;
        right: 6px;
        background: rgba(17, 24, 39, 0.72);
        color: white;
        font-size: 0.78rem;
        padding: 2px 8px;
        border-radius: 999px;
      }

      .modal-thumb-item.current-page .modal-thumb-page-label {
        background: rgba(180, 83, 9, 0.85);
      }

      .modal-thumb-zoom-button {
        position: absolute;
        top: 8px;
        right: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border-radius: 999px;
        border-color: rgba(15, 23, 42, 0.18);
        background: rgba(255, 255, 255, 0.92);
        color: var(--text);
        font-size: 1rem;
        box-shadow: 0 2px 8px rgba(15, 23, 42, 0.18);
        z-index: 2;
      }

      @media (hover: hover) {
        .modal-thumb-zoom-button {
          opacity: 0;
          pointer-events: none;
          transition: opacity 150ms ease;
        }

        .modal-thumb-item:hover .modal-thumb-zoom-button,
        .modal-thumb-item:focus-within .modal-thumb-zoom-button,
        .modal-thumb-zoom-button:focus-visible {
          opacity: 1;
          pointer-events: auto;
        }
      }

      .modal-thumb-overlay {
        position: absolute;
        inset: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px;
        background: rgba(15, 23, 42, 0.68);
        opacity: 0;
        pointer-events: none;
        transition: opacity 180ms ease;
      }

      .modal-thumb-overlay.is-open {
        opacity: 1;
        pointer-events: auto;
      }

      .modal-thumb-dialog {
        width: min(980px, 100%);
        max-height: min(90vh, 900px);
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        border-radius: 8px;
        background: white;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.38);
        transform: scale(0.985);
        transition: transform 180ms ease;
        overflow: hidden;
      }

      .modal-thumb-overlay.is-open .modal-thumb-dialog {
        transform: scale(1);
      }

      .modal-thumb-dialog-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        background: white;
      }

      .modal-thumb-dialog-title {
        font-weight: 600;
        font-size: 0.92rem;
      }

      .modal-thumb-dialog-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .modal-thumb-dialog-body {
        min-height: 320px;
        max-height: calc(90vh - 58px);
        overflow: auto;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px;
        background: var(--panel);
        text-align: center;
        color: var(--muted);
      }

      .modal-thumb-dialog-body img {
        max-width: 100%;
        max-height: calc(90vh - 86px);
        height: auto;
        display: block;
        border: 1px solid var(--border);
        background: white;
      }

      .modal-thumb-dialog-message {
        max-width: 24rem;
        font-size: 0.9rem;
      }

      .modal-thumb-dialog-retry {
        margin-top: 10px;
      }

      body.modal-thumb-overlay-open {
        overflow: hidden;
      }

      @media (max-width: 640px) {
        .shell { padding: 16px 12px 32px; }
        .brand-mark { width: 48px; height: 48px; }
        .topbar { grid-template-columns: 1fr; justify-items: center; }
        .topbar > [aria-hidden="true"] { display: none; }
        .brand { justify-self: center; }
        .nav { justify-self: center; }
        .settings-layout { grid-template-columns: 1fr; }
        .settings-sidebar { position: static; }
        .card { padding: 16px; border-radius: 18px; }
        th, td { padding: 10px 6px; }
        .viewer-header { align-items: flex-start; flex-direction: column; }
        .viewer-frame { height: calc(100vh - 230px); min-height: 420px; }
        .result-layout { grid-template-columns: 72px 1fr; gap: 12px; }
        .result-cover,
        .cover-thumb { width: 72px; height: 102px; }
        .progress { height: 12px; }
        .modal { padding: 8px; }
        .modal-panel { height: 96vh; border-radius: 10px; }
        .modal-thumb-panel {
          padding: 12px;
        }
        .modal-thumb-overlay {
          padding: 10px;
        }
        .modal-thumb-dialog {
          max-height: 92vh;
        }
        .modal-thumb-dialog-body {
          min-height: 260px;
          max-height: calc(92vh - 58px);
          padding: 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <div aria-hidden="true"></div>
        <div class="brand">
          <a class="brand-link" href="/" aria-label="ホームへ戻る" id="brand-home-link">
            <img class="brand-mark" src="/static/tsundokensaku-logo.png" alt="">
            <div class="brand-text">
              <h1>つんどけんさく</h1>
            </div>
          </a>
        </div>
        <nav class="nav">
          <a href="/packs" class="{% if request.url.path == '/packs' %}active{% endif %}" style="min-width: 88px;">資料一覧</a>
          <a href="/workspace" class="{% if request.url.path == '/workspace' %}active{% endif %}" style="min-width: 88px;">資料棚<span class="pill" id="nav-workspace-count" hidden></span></a>
          <a href="/settings" class="{% if request.url.path.startswith('/settings') %}active{% endif %}" style="min-width: 88px;">設定</a>
        </nav>
      </div>
      {% block content %}{% endblock %}
    </div>
      <div class="modal" id="pdf-modal" aria-hidden="true">
        <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="pdf-modal-title">
          <div class="modal-bar">
            <div class="modal-title" id="pdf-modal-title"></div>
            <div class="modal-actions">
              <button type="button" id="pdf-modal-fullscreen">全画面</button>
              <a class="button" id="pdf-modal-open" href="#" target="_blank" rel="noreferrer">PDFを開く</a>
              <a class="button" id="pdf-modal-scrapbox" href="#" target="_blank" rel="noreferrer" hidden>Scrapboxで開く</a>
              <button type="button" id="pdf-modal-close">閉じる</button>
            </div>
          </div>
          <div class="modal-bar" id="pdf-modal-browse-bar">
            <div class="modal-actions modal-assemble-actions">
              <details class="modal-chapters" id="pdf-modal-chapters-wrap" hidden>
                <summary id="pdf-modal-chapters-summary">章を選択</summary>
                <div class="modal-chapters-menu" id="pdf-modal-chapters"></div>
              </details>
              <label class="modal-pages">
                <span>ページ</span>
                <input id="pdf-modal-pages" type="text" inputmode="numeric" placeholder="例: 11-15,18">
              </label>
              <button type="button" class="primary" id="pdf-modal-add-workspace" hidden>資料に追加</button>
              <button type="button" id="pdf-modal-thumb-toggle" hidden>ページを選ぶ</button>
              <details class="modal-share" id="pdf-modal-export-wrap">
                <summary class="button">切出 ▾</summary>
                <div class="modal-share-menu">
                  <a class="modal-share-link" id="pdf-modal-export" href="#" target="_blank" rel="noreferrer"><span>指定ページをPDFに切出</span></a>
                  <a class="modal-share-link" id="pdf-modal-export-md" href="#" target="_blank" rel="noreferrer"><span>指定ページをMarkdownに切出</span></a>
                  <div id="pdf-modal-share-menu"></div>
                </div>
              </details>
              <div class="modal-export-status" id="pdf-modal-export-status"></div>
            </div>
          </div>
          <div class="modal-bar" id="pdf-modal-thumb-bar" hidden>
            <div class="modal-actions modal-assemble-actions">
              <button type="button" id="pdf-modal-thumb-back">◀ 閲覧に戻る</button>
              <span class="modal-thumb-heading" id="pdf-modal-thumb-heading"></span>
              <button type="button" class="primary" id="pdf-modal-thumb-apply" disabled>0ページを資料に反映</button>
              <div class="ws-status" id="pdf-modal-thumb-status"></div>
            </div>
          </div>
          <iframe class="modal-viewport" id="pdf-modal-frame" title="PDF viewer"></iframe>
          <div class="modal-thumb-panel" id="pdf-modal-thumb-panel" hidden>
            <div class="modal-thumb-scroll">
              <div class="modal-thumb-range-toggle">
                <button type="button" id="pdf-modal-thumb-prev" hidden>前の10ページを表示</button>
                <button type="button" id="pdf-modal-thumb-next-top" hidden>次の10ページを表示</button>
              </div>
              <div class="modal-thumb-grid" id="pdf-modal-thumb-grid"></div>
              <div class="modal-thumb-range-toggle">
                <button type="button" id="pdf-modal-thumb-prev-bottom" hidden>前の10ページを表示</button>
                <button type="button" id="pdf-modal-thumb-next" hidden>次の10ページを表示</button>
              </div>
            </div>
            <div class="modal-thumb-overlay" id="pdf-modal-thumb-overlay" hidden>
              <div class="modal-thumb-dialog" role="dialog" aria-modal="true" aria-labelledby="pdf-modal-thumb-detail-title">
                <div class="modal-thumb-dialog-header">
                  <div class="modal-thumb-dialog-title" id="pdf-modal-thumb-detail-title">拡大プレビュー</div>
                  <div class="modal-thumb-dialog-actions">
                    <button type="button" id="pdf-modal-thumb-detail-prev">前</button>
                    <button type="button" id="pdf-modal-thumb-detail-next">次</button>
                    <button type="button" id="pdf-modal-thumb-detail-close">閉じる</button>
                  </div>
                </div>
                <div class="modal-thumb-dialog-body" id="pdf-modal-thumb-detail-body" aria-live="polite"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    <script src="/static/pdf-modal.js"></script>
    <script>
      (() => {
        const homeLink = document.getElementById('brand-home-link');
        // 資料棚（資料を編集中の画面）からは選択中の資料を維持したままホームへ戻る。
        // それ以外の画面（検索結果等）からは、前の資料を引きずらず新しい調査を
        // 始められるよう未選択に戻す
        const keepActivePack = {{ 'true' if request.url.path == '/workspace' else 'false' }};
        homeLink?.addEventListener('click', (event) => {
          // 中クリック・修飾キー付きクリック（新規タブ等）はブラウザ標準の挙動に任せる
          if (event.button !== 0 || event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) {
            return;
          }
          if (keepActivePack) {
            return; // 通常のリンク遷移に任せる（deactivateしない）
          }
          event.preventDefault();
          const destination = homeLink.href;
          (async () => {
            try {
              await window.TsundokuCart.deactivatePack();
            } catch (error) {
              console.warn('Failed to deactivate pack', error);
            }
            window.location.href = destination;
          })();
        });
      })();
    </script>
  </body>
</html>
