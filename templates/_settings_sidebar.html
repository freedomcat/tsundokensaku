<aside class="settings-sidebar">
  <section class="card" style="padding: 14px;">
    <div class="grid">
      <a class="stat" href="/settings#pdf-list-section" style="display:block; color: inherit; text-decoration: none;">
        <div class="label">PDF一覧</div>
        <div class="value">{{ pdf_count }}</div>
      </a>
      <a class="stat" href="/settings#kindle-list-section" style="display:block; color: inherit; text-decoration: none;">
        <div class="label">Kindle本一覧</div>
        <div class="value">{{ kindle_count }}</div>
      </a>
      <div class="stat">
        <div class="label">登録済み書籍数</div>
        <div class="value">{{ book_count }}</div>
      </div>
      <div class="stat">
        <div class="label">インデックス済みページ数</div>
        <div class="value">{{ page_count }}</div>
      </div>
    </div>
  </section>

  <section class="card" style="padding: 16px;">
    <h3 style="margin-top: 0;">設定メニュー</h3>
    <nav class="settings-nav">
      <a class="{% if active_settings_page == 'index' %}active{% endif %}" href="/settings">インデックス</a>
      <a class="{% if active_settings_page == 'info' %}active{% endif %}" href="/settings/info">情報</a>
    </nav>
  </section>
</aside>
