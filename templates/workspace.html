{% extends "base.html" %}
{% block title %}つんどけんさく | 資料棚{% endblock %}
{% block content %}
<section class="card">
  <h2 style="margin: 0 0 6px;">資料棚</h2>
  <p class="muted" style="margin: 0 0 14px;">必要なページを集めて、AIへ渡す資料を組み立てます。資料ごとに保存されます。</p>
  <div class="ws-toolbar" style="margin-bottom: 10px;">
    <label style="display:inline-flex; align-items:center; gap:6px;">
      現在の資料：
      <select id="ws-pack-select" aria-label="資料を選択"></select>
    </label>
    <button type="button" id="ws-pack-new">新しい資料</button>
    <button type="button" id="ws-pack-rename">名前を変更</button>
    <button type="button" id="ws-pack-delete">資料を削除</button>
  </div>
  <div class="ws-toolbar">
    <span class="pill" id="ws-count"></span>
    <span class="pill" id="ws-export-preview" hidden></span>
    <button type="button" id="ws-add-open">ページを追加</button>
    <button type="button" class="primary" id="ws-export-pdf">PDF一式を書き出す</button>
    <button type="button" id="ws-export-md">MD一式を書き出す</button>
    <button type="button" id="ws-export-json" title="PDF本体ではなく、資料の構成・ページ範囲・並び順をJSONで保存します">資料データを書き出す</button>
    <button type="button" id="ws-import-json" title="つんどけんさくで書き出したJSONから資料を復元します">資料データを読み込む</button>
    <input type="file" id="ws-import-file-input" accept=".json,application/json" style="display:none">
    <button type="button" id="ws-clear">この資料を空にする</button>
    <span class="ws-status" id="ws-status"></span>
  </div>
</section>

<div class="modal" id="ws-add-modal" aria-hidden="true">
  <div class="modal-panel ws-add-panel" role="dialog" aria-modal="true" aria-labelledby="ws-add-title">
    <div class="modal-bar">
      <div class="modal-title" id="ws-add-title">ページを追加</div>
      <div class="modal-actions">
        <button type="button" id="ws-add-close">閉じる</button>
      </div>
    </div>
    <form class="ws-add-form" id="ws-add-form">
      <select id="ws-add-scope" aria-label="検索対象の本"></select>
      <input type="search" id="ws-add-query" placeholder="キーワードでページを検索">
      <button type="submit" class="primary">検索</button>
    </form>
    <div class="ws-add-results" id="ws-add-results">
      <p class="muted" style="margin: 0;">この資料に入っているPDFの本文からページを検索します。</p>
    </div>
    <div class="ws-add-footer">
      <button type="button" class="primary" id="ws-add-submit" disabled>選択したページを追加</button>
      <button type="button" id="ws-add-cancel">キャンセル</button>
      <span class="ws-status" id="ws-add-status"></span>
    </div>
  </div>
</div>

<section class="card">
  <div id="ws-books"></div>
  <p class="muted" id="ws-empty" hidden>この資料は空です。検索結果の「資料に追加」からページを追加してください。</p>
  <div id="ws-no-pack" hidden>
    <p class="muted" style="margin: 0 0 10px;">資料はまだありません。</p>
    <button type="button" class="primary" id="ws-no-pack-new">＋ 新しい資料</button>
  </div>
  <div id="ws-no-active-pack" hidden>
    <p class="muted" style="margin: 0;">資料が選択されていません。上のセレクトから資料を選ぶか、新しい資料を作成してください。</p>
  </div>
</section>

<script>
  (() => {
    const booksContainer = document.getElementById('ws-books');
    const emptyMessage = document.getElementById('ws-empty');
    const countBadge = document.getElementById('ws-count');
    const exportPreviewBadge = document.getElementById('ws-export-preview');
    const exportPdfButton = document.getElementById('ws-export-pdf');
    const exportMdButton = document.getElementById('ws-export-md');
    const exportJsonButton = document.getElementById('ws-export-json');
    const importJsonButton = document.getElementById('ws-import-json');
    const importFileInput = document.getElementById('ws-import-file-input');
    const clearButton = document.getElementById('ws-clear');
    const statusLine = document.getElementById('ws-status');
    const addOpenButton = document.getElementById('ws-add-open');
    const addModal = document.getElementById('ws-add-modal');
    const addForm = document.getElementById('ws-add-form');
    const addScope = document.getElementById('ws-add-scope');
    const addQuery = document.getElementById('ws-add-query');
    const addResults = document.getElementById('ws-add-results');
    const addSubmitButton = document.getElementById('ws-add-submit');
    const addStatus = document.getElementById('ws-add-status');
    const outlineCache = new Map();

    function setStatus(message, isError = false) {
      statusLine.textContent = message || '';
      statusLine.classList.toggle('is-error', Boolean(isError && message));
    }

    function refreshSummary() {
      const cart = TsundokuCart.load();
      const hasPack = TsundokuCart.getActivePack() !== null;
      const count = TsundokuCart.bookCount(cart);
      countBadge.textContent = hasPack ? TsundokuCart.summaryLabel(cart) : '';
      countBadge.hidden = !hasPack;
      emptyMessage.hidden = !hasPack || count > 0;
      // noPackSection / noActivePackSection の表示は資料一覧の有無が絡むため refreshPackBar 側で判定する
      for (const button of [exportPdfButton, exportMdButton, exportJsonButton, clearButton, addOpenButton]) {
        button.disabled = !hasPack || count === 0;
      }
      importJsonButton.disabled = !hasPack;
      packRenameButton.disabled = !hasPack;
      packDeleteButton.disabled = !hasPack;
    }

    // トークン数は概算（設計書 docs/ai-export-optimization-design.md 8.1）なので
    // 常に「約」を付ける。1万以上は万単位に丸めて桁を読みやすくする
    function formatApproxTokenCount(tokens) {
      if (tokens >= 10000) {
        const man = Math.round((tokens / 10000) * 10) / 10;
        return `約${man}万トークン`;
      }
      return `約${tokens.toLocaleString('ja-JP')}トークン`;
    }

    function renderExportPreview(preview) {
      const summary = `${preview.book_count}冊・${preview.item_count}項目・${preview.total_pages}ページ・${formatApproxTokenCount(preview.estimated_tokens)}`;
      // empty_pack は「0件」を表すだけで未集計の欠落ではないので、一部未集計扱いにしない
      const gapWarnings = (preview.warnings || []).filter((warning) => warning.code !== 'empty_pack');
      exportPreviewBadge.textContent = gapWarnings.length > 0 ? `${summary}（一部未集計）` : summary;
      exportPreviewBadge.title = gapWarnings.map((warning) => warning.message).join('\n');
      exportPreviewBadge.classList.remove('muted');
      exportPreviewBadge.hidden = false;
    }

    function showExportPreviewError() {
      // 画面全体のエラーにはせず、この要約表示だけ控えめな状態にする
      exportPreviewBadge.textContent = '概算を取得できませんでした';
      exportPreviewBadge.title = '';
      exportPreviewBadge.classList.add('muted');
      exportPreviewBadge.hidden = false;
    }

    async function refreshExportPreview() {
      const pack = TsundokuCart.getActivePack();
      if (!pack) {
        exportPreviewBadge.hidden = true;
        return;
      }
      try {
        const response = await fetch(`/api/packs/${pack.id}/export/preview`);
        if (!response.ok) {
          throw new Error(`GET /api/packs/${pack.id}/export/preview -> ${response.status}`);
        }
        const preview = await response.json();
        // 取得中に資料が切り替わっていたら、古い資料の結果を表示しない
        const stillActive = TsundokuCart.getActivePack();
        if (!stillActive || stillActive.id !== pack.id) {
          return;
        }
        renderExportPreview(preview);
      } catch (error) {
        console.warn('Failed to load export preview', error);
        const stillActive = TsundokuCart.getActivePack();
        if (!stillActive || stillActive.id !== pack.id) {
          return;
        }
        showExportPreviewError();
      }
    }

    function updateItem(key, updater) {
      const cart = TsundokuCart.load();
      const items = Array.isArray(cart.items) ? cart.items : [];
      const entry = items.find((item) => TsundokuCart.itemKey(item) === key);
      if (!entry) {
        return;
      }
      updater(entry);
      TsundokuCart.save(cart);
      refreshSummary();
    }

    function removeItem(key) {
      const cart = TsundokuCart.load();
      if (Array.isArray(cart.items)) {
        cart.items = cart.items.filter((item) => TsundokuCart.itemKey(item) !== key);
      }
      TsundokuCart.save(cart);
      refreshSummary();
      void refreshPackBar();
    }

    function moveItem(key, delta) {
      const cart = TsundokuCart.load();
      if (!Array.isArray(cart.items)) {
        return;
      }
      const index = cart.items.findIndex((item) => TsundokuCart.itemKey(item) === key);
      const target = index + delta;
      if (index === -1 || target < 0 || target >= cart.items.length) {
        return;
      }
      [cart.items[index], cart.items[target]] = [cart.items[target], cart.items[index]];
      TsundokuCart.save(cart);
      renderAll();
      setStatus('');
    }

    async function fetchOutline(path) {
      if (outlineCache.has(path)) {
        return outlineCache.get(path);
      }
      let outline = { pageCount: null, chapters: [] };
      try {
        const response = await fetch(`/pdf-outline?${new URLSearchParams({ pdf_path: path })}`);
        if (response.ok) {
          const payload = await response.json();
          outline = {
            pageCount:
              Number.isInteger(payload.page_count) && payload.page_count > 0 ? payload.page_count : null,
            chapters: Array.isArray(payload.chapters) ? payload.chapters : [],
          };
        }
      } catch (error) {
        console.warn('Failed to load PDF outline', error);
      }
      outlineCache.set(path, outline);
      return outline;
    }

    function renderChapters(card, path, outline) {
      const holder = card.querySelector('.ws-chapters-holder');
      holder.innerHTML = '';
      if (outline.chapters.length === 0) {
        return;
      }
      const caption = document.createElement('div');
      caption.className = 'ws-chapters-caption';
      caption.textContent = '章から選ぶ（チェックした章の範囲でページ範囲を置き換えます）';
      const list = document.createElement('div');
      list.className = 'ws-chapters';
      for (const chapter of outline.chapters) {
        const item = document.createElement('label');
        item.className = 'modal-chapter-item';
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.value = chapter.pages;
        const text = document.createElement('span');
        const indent = '　'.repeat(Math.max(0, (chapter.level || 1) - 1));
        const range = chapter.start_page === chapter.end_page
          ? `p.${chapter.start_page}`
          : `p.${chapter.start_page}-${chapter.end_page}`;
        text.textContent = `${indent}${chapter.title} (${range})`;
        item.appendChild(checkbox);
        item.appendChild(text);
        list.appendChild(item);
      }
      list.addEventListener('change', () => {
        const selected = [...list.querySelectorAll('input:checked')].map((input) => input.value);
        const input = card.querySelector('.ws-pages-input');
        input.value = TsundokuPages.mergeSpecs(selected);
        input.dispatchEvent(new Event('input'));
      });
      holder.appendChild(caption);
      holder.appendChild(list);
    }

    function buildCard(entry, index, total) {
      const path = entry.pdf_path;
      const key = TsundokuCart.itemKey(entry);
      const card = document.createElement('details');
      card.className = 'ws-book';
      card.open = !entry.collapsed;
      if (entry.id !== undefined && entry.id !== null) {
        card.dataset.itemId = String(entry.id);
      }
      if (entry.clientId !== undefined && entry.clientId !== null) {
        card.dataset.clientId = String(entry.clientId);
      }

      const summary = document.createElement('summary');
      const title = document.createElement('span');
      title.className = 'ws-book-title';
      title.textContent = entry.title;
      const rangePill = document.createElement('span');
      rangePill.className = 'pill ws-book-range';

      // 件数のみ表示（詳細なページ範囲は編集用チップ側と重複するため出さない）。
      // 開区間（例: "39-"）は countPages が null を返すため spec 文字列にフォールバックする
      function pageCountLabel(value) {
        if (!value) {
          return '未指定';
        }
        const count = TsundokuPages.countPages(value);
        return count !== null ? `${count}ページ` : `p.${value}`;
      }

      rangePill.textContent = pageCountLabel(entry.pages);
      const moveUpButton = document.createElement('button');
      moveUpButton.type = 'button';
      moveUpButton.className = 'ws-remove';
      moveUpButton.textContent = '上へ';
      moveUpButton.disabled = index === 0;
      moveUpButton.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();
        moveItem(key, -1);
      });
      const moveDownButton = document.createElement('button');
      moveDownButton.type = 'button';
      moveDownButton.className = 'ws-remove';
      moveDownButton.textContent = '下へ';
      moveDownButton.disabled = index === total - 1;
      moveDownButton.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();
        moveItem(key, 1);
      });
      const openPdfButton = document.createElement('button');
      openPdfButton.type = 'button';
      openPdfButton.className = 'ws-remove';
      openPdfButton.textContent = 'PDFで選ぶ';
      openPdfButton.dataset.pdfModalUrl = `/pdf/${encodeURIComponent(path)}`;
      openPdfButton.dataset.pdfModalTitle = entry.title;
      openPdfButton.dataset.pdfModalPath = path;
      openPdfButton.dataset.pdfModalPages = entry.pages;
      openPdfButton.dataset.pdfModalItemKey = key;
      const addPagesButton = document.createElement('button');
      addPagesButton.type = 'button';
      addPagesButton.className = 'ws-remove';
      addPagesButton.textContent = 'ページを追加';
      addPagesButton.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();
        openAddModal(path);
      });
      const removeButton = document.createElement('button');
      removeButton.type = 'button';
      removeButton.className = 'ws-remove';
      removeButton.textContent = '削除';
      removeButton.addEventListener('click', (event) => {
        event.preventDefault();
        event.stopPropagation();
        removeItem(key);
        card.remove();
        setStatus('');
      });
      summary.appendChild(title);
      summary.appendChild(rangePill);
      summary.appendChild(moveUpButton);
      summary.appendChild(moveDownButton);
      summary.appendChild(openPdfButton);
      summary.appendChild(addPagesButton);
      summary.appendChild(removeButton);

      const body = document.createElement('div');
      body.className = 'ws-book-body';

      const pagesRow = document.createElement('label');
      pagesRow.className = 'ws-pages-row';
      const pagesLabel = document.createElement('span');
      pagesLabel.textContent = 'ページ範囲';
      const pagesInput = document.createElement('input');
      pagesInput.type = 'text';
      pagesInput.className = 'ws-pages-input';
      pagesInput.value = entry.pages;
      pagesInput.placeholder = '例: 11-15,18';
      pagesRow.appendChild(pagesLabel);
      pagesRow.appendChild(pagesInput);

      const chipsContainer = document.createElement('div');
      chipsContainer.className = 'ws-page-chips';
      let chipsExpanded = false;
      const CHIPS_COLLAPSE_THRESHOLD = 8;

      function chipLabel(interval) {
        if (interval.start !== null && interval.end !== null) {
          return interval.start === interval.end ? `p.${interval.start}` : `p.${interval.start}-${interval.end}`;
        }
        return interval.start === null ? `p.-${interval.end}` : `p.${interval.start}-`;
      }

      // 区間のページ番号一覧を返す。開区間で終端が特定できなければ null（丸ごと削除にフォールバック）
      function pageNumbersForInterval(interval, pageCount) {
        const start = interval.start === null ? 1 : interval.start;
        const end = interval.end === null ? pageCount : interval.end;
        if (end === null || end === undefined) {
          return null;
        }
        const pages = [];
        for (let page = start; page <= end; page += 1) {
          pages.push(page);
        }
        return pages;
      }

      function removeRawChunk(spec, rawText) {
        return spec
          .split(',')
          .map((chunk) => chunk.trim())
          .filter((chunk) => chunk !== '' && chunk !== rawText)
          .join(',');
      }

      function renderChips() {
        chipsContainer.innerHTML = '';
        const intervals = TsundokuPages.specToIntervals(pagesInput.value);
        if (intervals.length === 0) {
          const empty = document.createElement('span');
          empty.className = 'ws-page-chips-empty';
          empty.textContent = 'ページ未指定';
          chipsContainer.appendChild(empty);
          return;
        }
        const visible = chipsExpanded ? intervals : intervals.slice(0, CHIPS_COLLAPSE_THRESHOLD);
        for (const interval of visible) {
          const label = chipLabel(interval);
          const chip = document.createElement('span');
          chip.className = 'ws-page-chip';
          const chipText = document.createElement('span');
          chipText.textContent = label;
          const removeBtn = document.createElement('button');
          removeBtn.type = 'button';
          removeBtn.className = 'ws-page-chip-remove';
          removeBtn.setAttribute('aria-label', `${label} を削除`);
          removeBtn.textContent = '×';
          removeBtn.addEventListener('click', (event) => {
            event.preventDefault();
            event.stopPropagation();
            const outline = outlineCache.get(path);
            const pageCount = outline ? outline.pageCount : null;
            const pages = pageNumbersForInterval(interval, pageCount);
            const nextSpec = pages
              ? TsundokuPages.subtractPages(pagesInput.value, pages)
              : removeRawChunk(pagesInput.value, interval.text);
            pagesInput.value = nextSpec;
            pagesInput.dispatchEvent(new Event('input'));
          });
          chip.appendChild(chipText);
          chip.appendChild(removeBtn);
          chipsContainer.appendChild(chip);
        }
        if (intervals.length > CHIPS_COLLAPSE_THRESHOLD) {
          const toggle = document.createElement('button');
          toggle.type = 'button';
          toggle.className = 'ws-page-chips-toggle';
          toggle.textContent = chipsExpanded ? '折りたたむ' : `他${intervals.length - CHIPS_COLLAPSE_THRESHOLD}件を表示`;
          toggle.addEventListener('click', (event) => {
            event.preventDefault();
            event.stopPropagation();
            chipsExpanded = !chipsExpanded;
            renderChips();
          });
          chipsContainer.appendChild(toggle);
        }
      }

      const errorLine = document.createElement('div');
      errorLine.className = 'ws-error';
      errorLine.hidden = true;

      const chaptersHolder = document.createElement('div');
      chaptersHolder.className = 'ws-chapters-holder';

      pagesInput.addEventListener('input', () => {
        const value = pagesInput.value.trim();
        const outline = outlineCache.get(path);
        const error = value ? TsundokuPages.validatePageSpec(value, outline ? outline.pageCount : null) : 'ページを指定してください';
        errorLine.textContent = error;
        errorLine.hidden = !error;
        rangePill.textContent = pageCountLabel(value);
        updateItem(key, (item) => {
          item.pages = value;
        });
        setStatus('');
        renderChips();
      });

      renderChips();

      card.addEventListener('toggle', () => {
        // 再描画由来の toggle で collapsed が同値のときは保存しない
        const currentCart = TsundokuCart.load();
        const items = Array.isArray(currentCart.items) ? currentCart.items : [];
        const currentItem = items.find((item) => TsundokuCart.itemKey(item) === key);
        if (currentItem && currentItem.collapsed !== !card.open) {
          updateItem(key, (item) => {
            item.collapsed = !card.open;
          });
        }
        if (card.open && !chaptersHolder.dataset.loaded) {
          chaptersHolder.dataset.loaded = '1';
          void fetchOutline(path).then((outline) => {
            renderChapters(card, path, outline);
            pagesInput.dispatchEvent(new Event('input'));
          });
        }
      });

      body.appendChild(pagesRow);
      body.appendChild(chipsContainer);
      body.appendChild(errorLine);
      body.appendChild(chaptersHolder);
      card.appendChild(summary);
      card.appendChild(body);

      if (card.open) {
        chaptersHolder.dataset.loaded = '1';
        void fetchOutline(path).then((outline) => {
          renderChapters(card, path, outline);
          const value = pagesInput.value.trim();
          const error = value ? TsundokuPages.validatePageSpec(value, outline.pageCount) : 'ページを指定してください';
          errorLine.textContent = error;
          errorLine.hidden = !error;
        });
      }
      return card;
    }

    function renderAll() {
      const cart = TsundokuCart.load();
      booksContainer.innerHTML = '';
      const items = Array.isArray(cart.items) ? cart.items : [];
      items.forEach((entry, index) => {
        booksContainer.appendChild(buildCard(entry, index, items.length));
      });
      refreshSummary();
    }

    function filenameFromContentDisposition(header) {
      const utf8Match = /filename\*=UTF-8''([^;]+)/i.exec(header || '');
      if (utf8Match) {
        try {
          return decodeURIComponent(utf8Match[1]);
        } catch (error) {
          console.warn('Failed to decode filename', error);
        }
      }
      const asciiMatch = /filename="?([^";]+)"?/i.exec(header || '');
      return asciiMatch ? asciiMatch[1] : '';
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = filename || 'export';
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    async function errorMessageFromResponse(response) {
      const text = await response.text().catch(() => '');
      try {
        const parsed = JSON.parse(text);
        if (parsed && typeof parsed.detail === 'string') {
          return parsed.detail;
        }
      } catch (error) {
        // JSONでなければ本文をそのまま使う
      }
      return text || 'エクスポートに失敗しました';
    }

    async function exportPackZip(format) {
      const pack = TsundokuCart.getActivePack();
      if (!pack) {
        return;
      }
      const cart = TsundokuCart.load();
      const items = Array.isArray(cart.items) ? cart.items : [];
      if (format !== 'json' && items.length === 0) {
        return;
      }
      for (const entry of items) {
        const path = entry.pdf_path;
        const outline = outlineCache.get(path);
        // json フォーマットのときは実ファイルのロードや validatePageSpec での実ページ数検証は省略する（構文のみチェック）
        const error = entry.pages.trim()
          ? (format === 'json' ? '' : TsundokuPages.validatePageSpec(entry.pages, outline ? outline.pageCount : null))
          : 'ページを指定してください';
        if (error) {
          setStatus(`${entry.title}: ${error}`, true);
          return;
        }
      }
      const buttons = [exportPdfButton, exportMdButton, exportJsonButton, clearButton];
      for (const button of buttons) {
        button.disabled = true;
      }
      try {
        setStatus(format === 'json' ? '資料データを書き出し中...' : '資料一式を書き出し中...');
        // サーバの最新内容でエクスポートするため、デバウンス中の未送信編集を先に反映させる
        await TsundokuCart.flushPendingSave();
        const response = await fetch(`/api/packs/${pack.id}/export?${new URLSearchParams({ format })}`);
        if (!response.ok) {
          throw new Error(await errorMessageFromResponse(response));
        }
        const blob = await response.blob();
        const defaultFilename = format === 'json' ? 'export.json' : 'export.zip';
        const filename = filenameFromContentDisposition(response.headers.get('Content-Disposition')) || defaultFilename;
        downloadBlob(blob, filename);
        setStatus(format === 'json' ? '資料データ（JSON）をダウンロードしました' : '資料一式（ZIP）をダウンロードしました');
      } catch (error) {
        setStatus(error instanceof Error ? error.message : 'エクスポートに失敗しました', true);
      } finally {
        for (const button of buttons) {
          button.disabled = false;
        }
        refreshSummary();
      }
    }

    function setAddStatus(message, isError = false) {
      addStatus.textContent = message || '';
      addStatus.classList.toggle('is-error', Boolean(isError && message));
    }

    function updateAddSubmitState() {
      addSubmitButton.disabled = addResults.querySelectorAll('input:checked').length === 0;
    }

    function openAddModal(scopePath = '') {
      addQuery.value = '';
      addScope.innerHTML = '';
      const allOption = document.createElement('option');
      allOption.value = '';
      allOption.textContent = 'すべての本';
      addScope.appendChild(allOption);
      const cart = TsundokuCart.load();
      const items = Array.isArray(cart.items) ? cart.items : [];
      for (const item of items) {
        const option = document.createElement('option');
        option.value = item.pdf_path;
        option.textContent = item.title;
        addScope.appendChild(option);
      }
      addScope.value = scopePath && items.some((item) => item.pdf_path === scopePath) ? scopePath : '';
      const activePack = TsundokuCart.getActivePack();
      const guide = document.createElement('p');
      guide.className = 'muted';
      guide.style.margin = '0';
      guide.textContent = activePack
        ? `資料「${activePack.name}」に入っている本の本文からページを検索します。`
        : '対象の本の本文からページを検索します。';
      addResults.innerHTML = '';
      addResults.appendChild(guide);
      setAddStatus('');
      updateAddSubmitState();
      addModal.classList.add('open');
      addModal.setAttribute('aria-hidden', 'false');
      addQuery.focus();
    }

    function closeAddModal() {
      addModal.classList.remove('open');
      addModal.setAttribute('aria-hidden', 'true');
    }

    function renderSearchGroup(entry, payload, query) {
      const group = document.createElement('div');
      const heading = document.createElement('div');
      heading.className = 'ws-add-book-title';
      heading.textContent = entry.title;
      group.appendChild(heading);
      if (!payload.indexed) {
        const note = document.createElement('p');
        note.className = 'muted';
        note.style.margin = '0';
        note.textContent = '未インデックスのため検索できません。設定画面でインデックスを実行してください。';
        group.appendChild(note);
        return group;
      }
      if (payload.pages.length === 0) {
        const note = document.createElement('p');
        note.className = 'muted';
        note.style.margin = '0';
        note.textContent = `「${query}」に一致するページはありません。`;
        group.appendChild(note);
        return group;
      }
      for (const hit of payload.pages) {
        const row = document.createElement('label');
        row.className = 'modal-chapter-item';
        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.value = String(hit.page_number);
        checkbox.dataset.path = entry.path;
        const text = document.createElement('span');
        const alreadyAdded = TsundokuPages.specContainsPages(entry.pages, [hit.page_number]);
        text.textContent = `p.${hit.page_number}  ${hit.snippet}${alreadyAdded ? '（追加済み）' : ''}`;
        if (alreadyAdded) {
          checkbox.disabled = true;
          row.classList.add('ws-add-row-added');
        }
        row.appendChild(checkbox);
        row.appendChild(text);
        group.appendChild(row);
      }
      return group;
    }

    async function runPageSearch() {
      const query = addQuery.value.trim();
      if (!query) {
        setAddStatus('検索キーワードを入力してください', true);
        return;
      }
      const cart = TsundokuCart.load();
      const items = Array.isArray(cart.items) ? cart.items : [];
      const scopePath = addScope.value;
      const entries = items.filter((item) => !scopePath || item.pdf_path === scopePath);
      addResults.innerHTML = '<p class="muted" style="margin: 0;">検索中...</p>';
      setAddStatus('');
      const groups = [];
      for (const entry of entries) {
        try {
          const response = await fetch(
            `/search-pages?${new URLSearchParams({ pdf_path: entry.pdf_path, q: query })}`
          );
          if (!response.ok) {
            throw new Error(await errorMessageFromResponse(response));
          }
          const payload = await response.json();
          groups.push(renderSearchGroup({ path: entry.pdf_path, title: entry.title, pages: entry.pages }, payload, query));
        } catch (error) {
          const group = document.createElement('div');
          const heading = document.createElement('div');
          heading.className = 'ws-add-book-title';
          heading.textContent = entry.title;
          const note = document.createElement('div');
          note.className = 'ws-error';
          note.textContent = error instanceof Error ? error.message : '検索に失敗しました';
          group.appendChild(heading);
          group.appendChild(note);
          groups.push(group);
        }
      }
      addResults.innerHTML = '';
      for (const group of groups) {
        addResults.appendChild(group);
      }
      updateAddSubmitState();
    }

    function addSelectedPages() {
      const selectedByPath = new Map();
      for (const checkbox of addResults.querySelectorAll('input:checked')) {
        const path = checkbox.dataset.path;
        const page = parseInt(checkbox.value, 10);
        if (!path || !Number.isInteger(page)) {
          continue;
        }
        if (!selectedByPath.has(path)) {
          selectedByPath.set(path, []);
        }
        selectedByPath.get(path).push(page);
      }
      if (selectedByPath.size === 0) {
        return;
      }
      const cart = TsundokuCart.load();
      const items = Array.isArray(cart.items) ? cart.items : [];
      let addedCount = 0;
      for (const [path, pages] of selectedByPath) {
        const entry = items.find((item) => item.pdf_path === path);
        if (!entry) {
          continue;
        }
        const newPages = pages.filter((page) => !TsundokuPages.specContainsPages(entry.pages, [page]));
        if (newPages.length === 0) {
          continue;
        }
        entry.pages = TsundokuPages.mergeSpecs([entry.pages, TsundokuPages.pagesToSpec(newPages)]);
        addedCount += newPages.length;
      }
      TsundokuCart.save(cart);
      renderAll();
      closeAddModal();
      setStatus(addedCount > 0 ? `${addedCount}ページを追加しました` : '追加するページはありませんでした');
    }

    addOpenButton.addEventListener('click', openAddModal);
    document.getElementById('ws-add-close').addEventListener('click', closeAddModal);
    document.getElementById('ws-add-cancel').addEventListener('click', closeAddModal);
    addModal.addEventListener('click', (event) => {
      if (event.target === addModal) {
        closeAddModal();
      }
    });
    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && addModal.classList.contains('open')) {
        closeAddModal();
      }
    });
    addForm.addEventListener('submit', (event) => {
      event.preventDefault();
      void runPageSearch();
    });
    addScope.addEventListener('change', () => {
      if (addQuery.value.trim()) {
        void runPageSearch();
      }
    });
    addResults.addEventListener('change', updateAddSubmitState);
    addSubmitButton.addEventListener('click', addSelectedPages);

    exportPdfButton.addEventListener('click', () => {
      void exportPackZip('pdf');
    });

    exportMdButton.addEventListener('click', () => {
      void exportPackZip('md');
    });

    exportJsonButton.addEventListener('click', () => {
      void exportPackZip('json');
    });

    importJsonButton.addEventListener('click', () => {
      importFileInput.value = '';
      importFileInput.click();
    });

    importFileInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (!file) { return; }

      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const payload = JSON.parse(e.target.result);
          
          setStatus('資料データを読み込み中...');
          const response = await fetch('/api/packs/import', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            throw new Error(await errorMessageFromResponse(response));
          }

          const result = await response.json();
          console.log('IMPORT SUCCESS RESULT:', result);
          setStatus(`資料「${result.name}」（${result.items.length}項目）を読み込みました`);
          
          console.log('ACTIVATING PACK ID:', result.id);
          await TsundokuCart.activatePack(result.id);
          console.log('ACTIVATION COMPLETE');

        } catch (error) {
          console.error('IMPORT ERROR CAUGHT:', error);
          setStatus(error instanceof Error ? error.message : '読み込みに失敗しました', true);
        }
      };
      reader.readAsText(file);
    });

    clearButton.addEventListener('click', () => {
      const pack = TsundokuCart.getActivePack();
      const label = pack ? `資料「${pack.name}」` : 'この資料';
      if (!window.confirm(`${label}の内容をすべて削除します。よろしいですか？`)) {
        return;
      }
      TsundokuCart.save({ version: 2, books: {} });
      renderAll();
      void refreshPackBar();
      setStatus('');
    });

    const packSelect = document.getElementById('ws-pack-select');
    const packNewButton = document.getElementById('ws-pack-new');
    const packRenameButton = document.getElementById('ws-pack-rename');
    const packDeleteButton = document.getElementById('ws-pack-delete');
    const noPackSection = document.getElementById('ws-no-pack');
    const noPackNewButton = document.getElementById('ws-no-pack-new');
    const noActivePackSection = document.getElementById('ws-no-active-pack');

    async function refreshPackBar() {
      try {
        const listing = await TsundokuCart.listPacks();
        // アクティブ資料の冊数はデバウンス書込み前でも正しいようローカルの cart から出す
        const activePack = TsundokuCart.getActivePack();
        const localCount = TsundokuCart.bookCount(TsundokuCart.load());
        const packsExist = listing.packs.length > 0;
        packSelect.innerHTML = '';
        if (packsExist && !activePack) {
          const placeholder = new Option('資料を選択してください', '');
          placeholder.disabled = true;
          placeholder.selected = true;
          packSelect.appendChild(placeholder);
        }
        for (const pack of listing.packs) {
          const option = document.createElement('option');
          option.value = String(pack.id);
          const count = activePack && pack.id === activePack.id ? localCount : pack.book_count;
          option.textContent = `${pack.name}（${count}冊）`;
          packSelect.appendChild(option);
        }
        if (listing.active_pack_id !== null) {
          packSelect.value = String(listing.active_pack_id);
        }
        packSelect.disabled = !packsExist;
        noPackSection.hidden = packsExist;
        noActivePackSection.hidden = !packsExist || Boolean(activePack);
      } catch (error) {
        console.warn('Failed to list packs', error);
      }
    }

    async function createNewPackFlow() {
      const name = window.prompt('新しい資料の名前', '新しい資料');
      if (name === null) {
        return;
      }
      try {
        await TsundokuCart.createPack(name.trim());
        setStatus('');
      } catch (error) {
        setStatus('資料の作成に失敗しました', true);
      }
      await refreshPackBar();
    }

    packSelect.addEventListener('change', async () => {
      const packId = parseInt(packSelect.value, 10);
      if (!Number.isInteger(packId)) {
        return;
      }
      try {
        await TsundokuCart.activatePack(packId);
        setStatus('');
      } catch (error) {
        setStatus('資料の切替に失敗しました', true);
      }
      await refreshPackBar();
    });

    packNewButton.addEventListener('click', () => void createNewPackFlow());
    noPackNewButton.addEventListener('click', () => void createNewPackFlow());

    packRenameButton.addEventListener('click', async () => {
      const pack = TsundokuCart.getActivePack();
      if (!pack) {
        return;
      }
      const name = window.prompt('資料の名前', pack.name);
      if (name === null || !name.trim() || name.trim() === pack.name) {
        return;
      }
      try {
        await TsundokuCart.renamePack(pack.id, name.trim());
        setStatus('');
      } catch (error) {
        setStatus('名前の変更に失敗しました', true);
      }
      await refreshPackBar();
    });

    packDeleteButton.addEventListener('click', async () => {
      const pack = TsundokuCart.getActivePack();
      if (!pack) {
        return;
      }
      if (!window.confirm(`資料「${pack.name}」を削除します。集めたページの構成も削除されます。よろしいですか？`)) {
        return;
      }
      try {
        await TsundokuCart.deletePack(pack.id);
        setStatus('');
      } catch (error) {
        setStatus('資料の削除に失敗しました', true);
      }
      await refreshPackBar();
    });

    // PDFプレビューモーダルの「資料に追加」、およびサーバからの
    // パック取得完了・切替時に発火。セレクトの冊数表示も追随させる。
    // 資料項目の追加・削除・並び替え・ページ範囲変更・資料を空にする、のいずれも
    // デバウンス保存が完了した後にこのイベントが発火するため、概算表示の更新も
    // ここに一本化する（保存済みの最新値を参照できる。個別箇所への複製はしない）
    document.addEventListener('tsundoku-cart-updated', () => {
      renderAll();
      void refreshPackBar();
      void refreshExportPreview();
    });

    renderAll();
    void refreshPackBar();
  })();
</script>
{% endblock %}
