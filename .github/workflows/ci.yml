name: CI

on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop
      - feature/**

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install -e .
      - run: python -m unittest discover -s tests
