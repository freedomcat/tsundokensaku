services:
  app:
    build:
      context: .
    image: tsundokensaku:dev
    entrypoint: ["python", "-m", "uvicorn", "tsundokensaku.web:app"]
    command: ["--host", "0.0.0.0", "--port", "${WEB_PORT:-8000}"]
    working_dir: /app
    ports:
      - "${WEB_PORT:-8000}:${WEB_PORT:-8000}"
    volumes:
      - type: bind
        source: .
        target: /app
      - type: bind
        source: ${BOOKS_DIR:-./data/books}
        target: /data/books
      - type: bind
        source: ${DB_DIR:-./data}
        target: /app/data
    environment:
      PYTHONUNBUFFERED: "1"
      BOOKS_DIR: /data/books
      DB_DIR: /app/data
      PDF_EXPORT_SAVE_DIR: ${PDF_EXPORT_SAVE_DIR:-}
      SCRAPBOX_BASE_URL: ${SCRAPBOX_BASE_URL:-}
      SCRAPBOX_EXPORT_JSON: ${SCRAPBOX_EXPORT_JSON:-}
